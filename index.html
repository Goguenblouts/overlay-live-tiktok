<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Central de Overlays - Live TikTok</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e10;
    --bg-alt: #16161a;
    --surface: #1a1a1e;
    --surface-hover: #212126;
    --border: #2a2a30;
    --accent: #F0464B;
    --accent-dim: #8a2c30;
    --text: #f3f4f2;
    --text-dim: #93939a;
    --text-faint: #56565e;
    --grad-start: #D61F93;
    --grad-end: #7C22C8;
    --ic-links: #F0464B;
    --ic-previa: #2F9BD6;
    --ic-aparencia: #9B5DE5;
    --ic-config: #28C48A;
    --font-display: 'Space Grotesk', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }
  * { box-sizing: border-box; }
  body { background: var(--bg); }
  ::selection { background: var(--accent); color: #ffffff; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
  a { color: var(--accent); }
  input:focus-visible, select:focus-visible, button:focus-visible, textarea:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }
  button { font-family: var(--font-display); transition: transform 0.12s ease, background 0.12s ease, border-color 0.12s ease; }
  button:hover { transform: translateY(-1px); }
  button:active { transform: translateY(0); }
  input[type="text"], input[type="number"], select {
    font-family: var(--font-mono);
  }
  .painel-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    transition: border-color 0.15s ease;
  }
  .painel-card:hover { border-color: var(--text-faint); }
  .signal-bar {
    height: 2px;
    width: 100%;
    background: linear-gradient(90deg, transparent, var(--accent-dim), var(--accent), var(--accent-dim), transparent);
    background-size: 200% 100%;
    animation: signal-sweep 3.5s ease-in-out infinite;
    border-radius: 2px;
  }
  @keyframes signal-sweep {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  @media (prefers-reduced-motion: reduce) {
    .signal-bar { animation: none; background-position: 0 0; }
    button:hover { transform: none; }
  }
  .signal-bar { display: none; }
  .topbar {
    height: 48px;
    background: linear-gradient(90deg, var(--grad-start), var(--grad-end));
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 18px;
    flex-shrink: 0;
  }
  .topbar-logo {
    width: 24px; height: 24px; border-radius: 6px;
    background: rgba(255,255,255,0.22);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: #fff;
  }
  .topbar-title { color: #fff; font-weight: 700; font-size: 14px; letter-spacing: -0.01em; }
  .app-shell { display: flex; flex-direction: column; min-height: 100vh; }
  .painel-layout { display: flex; flex: 1; min-height: 0; }
  .painel-sidebar {
    width: 76px;
    flex-shrink: 0;
    background: var(--bg-alt);
    border-right: 1px solid var(--border);
    padding: 14px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .painel-main { flex: 1; min-width: 0; padding: 30px 36px 72px; max-width: 800px; }
  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    width: 100%;
    background: transparent;
    border: none;
    border-radius: 9px;
    padding: 9px 4px;
    cursor: pointer;
    font-family: var(--font-display);
  }
  .nav-item:hover { background: var(--surface-hover); transform: none; }
  .nav-item.ativo { background: var(--surface); }
  .nav-icon {
    width: 30px; height: 30px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 14px; font-weight: 700;
    opacity: 0.55;
    transition: opacity 0.15s ease;
  }
  .nav-item.ativo .nav-icon { opacity: 1; }
  .nav-label { font-size: 9.5px; color: var(--text-faint); text-align: center; line-height: 1.2; }
  .nav-item.ativo .nav-label { color: var(--text); }
  .oculto { display: none !important; }
  @media (max-width: 720px) {
    .painel-layout { flex-direction: column; }
    .painel-sidebar {
      width: 100%;
      flex-direction: row;
      overflow-x: auto;
      padding: 10px;
    }
    .nav-item { width: auto; flex-shrink: 0; padding: 6px 10px; }
    .painel-main { padding: 24px 18px 56px; }
  }

  /* ---- switch (toggle) ---- */
  .toggle { position: relative; display: inline-flex; align-items: center; gap: 9px; cursor: pointer; font-size: 13px; color: var(--text); user-select: none; }
  .toggle input { display: none; }
  .toggle .trilha {
    width: 36px; height: 20px; background: var(--bg-alt); border: 1px solid var(--border);
    border-radius: 999px; position: relative; transition: background 0.15s ease, border-color 0.15s ease; flex-shrink: 0;
  }
  .toggle .trilha::after {
    content: ""; position: absolute; top: 1px; left: 1px; width: 16px; height: 16px;
    border-radius: 50%; background: var(--text-faint); transition: transform 0.15s ease, background 0.15s ease;
  }
  .toggle input:checked + .trilha { background: var(--accent); border-color: var(--accent); }
  .toggle input:checked + .trilha::after { transform: translateX(16px); background: #fff; }

  /* ---- animações compartilhadas (painel + overlays) ---- */
  @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes popScale { 0% { transform: scale(1); } 35% { transform: scale(1.18); } 100% { transform: scale(1); } }
  @keyframes glowPulse {
    0% { box-shadow: 0 0 0 0 var(--glow-color, rgba(255,255,255,.5)); }
    70% { box-shadow: 0 0 24px 12px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  @keyframes confetePop { to { transform: translate(var(--tx, 0px), var(--ty, 0px)) rotate(var(--rot, 180deg)); opacity: 0; } }
  @keyframes slideInTop { from { opacity: 0; transform: translateY(-14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideOutTop { to { opacity: 0; transform: translateY(-14px); } }
  .secao-conteudo { animation: fadeSlideUp 0.3s ease both; }
  .linha-ranking-anim { animation: fadeSlideUp 0.4s ease both; }
  .anim-glow { animation: glowPulse 0.9s ease-out; }
  .anim-pop { animation: popScale 0.28s ease; }
  @media (prefers-reduced-motion: reduce) {
    .secao-conteudo, .linha-ranking-anim, .anim-glow, .anim-pop { animation: none !important; }
  }
</style>
</head>
<body>
<script>
/* ============================================================
   CENTRAL DE OVERLAYS
   - sem parâmetro na URL: mostra o painel (lista + config + tema)
   - ?view=metas    : overlay das metas da live (Browser Source)
   - ?view=ranking  : overlay do ranking de seguidores (Browser Source)
   - ?view=alerta   : overlay que mostra um card quando chega um
                      presente grande (Browser Source à parte)
   - ?view=combo    : overlay com contador de combo/sequência
                      (Browser Source à parte)
   - acrescente &sim=1 no final de qualquer link acima pra testar
     sem live e sem o TikFinity ligado (gera eventos falsos sozinho).
   Pra criar um overlay novo no futuro: adiciona um item em
   OVERLAYS e uma função render<Nome>() seguindo o padrão dos que
   já existem. Toda a parte visual usa cfg.tema, então overlays
   novos herdam a mesma personalização de graça.
   ============================================================ */

const OVERLAYS = [
  { id: "metas",   nome: "Metas da live",        desc: "Grade de metas com progresso animado" },
  { id: "ranking", nome: "Ranking de seguidores", desc: "Top espectadores por pontos" },
  { id: "alerta",  nome: "Alerta de presente",    desc: "Card temporário quando chega um presente grande" },
  { id: "combo",   nome: "Combo / sequência",     desc: "Contador ao vivo de likes e presentes em sequência" },
];

const PRESETS_TEMA = {
  "Verde neon":       { corPrimaria: "#1D9E75", corFundo: "#0d1512", corCard: "#152420", corBorda: "#1f3a32", corTexto: "#ffffff", corTextoSec: "#8fb3a8", raio: 12, fonte: "padrao" },
  "Roxo gamer":        { corPrimaria: "#7F77DD", corFundo: "#120f1f", corCard: "#1c1830", corBorda: "#332c52", corTexto: "#ffffff", corTextoSec: "#b3aee0", raio: 14, fonte: "montserrat" },
  "Rosa vibrante":     { corPrimaria: "#D4537E", corFundo: "#1a0f14", corCard: "#2a1620", corBorda: "#4a2534", corTexto: "#ffffff", corTextoSec: "#e0a8bc", raio: 16, fonte: "poppins" },
  "Escuro minimalista": { corPrimaria: "#f5f5f0", corFundo: "#0a0a0a", corCard: "#161616", corBorda: "#2a2a2a", corTexto: "#ffffff", corTextoSec: "#8a8a85", raio: 6, fonte: "bebas" },
};

const FONTES = {
  padrao:     { nome: "Padrão", css: "Arial, sans-serif", googleFamily: null },
  poppins:    { nome: "Poppins", css: "'Poppins', sans-serif", googleFamily: "Poppins:wght@400;600;700" },
  montserrat: { nome: "Montserrat", css: "'Montserrat', sans-serif", googleFamily: "Montserrat:wght@400;600;700" },
  bebas:      { nome: "Bebas Neue (números grandes)", css: "'Bebas Neue', sans-serif", googleFamily: "Bebas+Neue" },
};

const CONFIG_PADRAO = {
  tikfinityWsUrl: "ws://127.0.0.1:21213/",
  valores: {
    mensagem: 1,
    likeACada: 10,
    likeValor: 1,
    presente: 1,
    seguidor: 3,
    compartilhamento: 5,
  },
  exigirSeguidor: true,
  tamanhoRanking: 5,
  tiers: [
    { id: "baixo",  nome: "Jam track",       pontos: 315,  escopo: "live",   fontes: ["mensagem", "like", "compartilhamento"] },
    { id: "medio1", nome: "Emote",            pontos: 785,  escopo: "live",   fontes: ["presente"] },
    { id: "medio2", nome: "Battle pass",       pontos: 1375, escopo: "mensal", fontes: ["presente"] },
    { id: "epico",  nome: "Bundle de skin",    pontos: 3410, escopo: "mensal", fontes: ["presente"] },
  ],
  tema: {
    corPrimaria: "#1D9E75",
    corFundo: "#15171a",
    corCard: "#202226",
    corBorda: "#3a3c40",
    corTexto: "#ffffff",
    corTextoSec: "#9a9a95",
    raio: 12,
    fonte: "padrao",
  },
  animacoes: true,
  alerta: { ativo: true, valorMinimo: 50, duracaoMs: 5000 },
  combo: { ativo: true, janelaMs: 2500, fontes: ["like", "presente"] },
};

function carregarConfig() {
  try {
    const salvo = JSON.parse(localStorage.getItem("configGeral"));
    if (!salvo) return structuredClone(CONFIG_PADRAO);
    const cfg = Object.assign(structuredClone(CONFIG_PADRAO), salvo);
    cfg.tema = Object.assign(structuredClone(CONFIG_PADRAO.tema), salvo.tema || {});
    cfg.valores = Object.assign(structuredClone(CONFIG_PADRAO.valores), salvo.valores || {});
    cfg.alerta = Object.assign(structuredClone(CONFIG_PADRAO.alerta), salvo.alerta || {});
    cfg.combo = Object.assign(structuredClone(CONFIG_PADRAO.combo), salvo.combo || {});
    cfg.animacoes = salvo.animacoes !== undefined ? salvo.animacoes : CONFIG_PADRAO.animacoes;
    return cfg;
  } catch (e) {
    return structuredClone(CONFIG_PADRAO);
  }
}
function salvarConfig(cfg) {
  localStorage.setItem("configGeral", JSON.stringify(cfg));
}

function carregarFonteGoogle(fonteKey) {
  const f = FONTES[fonteKey] || FONTES.padrao;
  if (f.googleFamily) {
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = "https://fonts.googleapis.com/css2?family=" + f.googleFamily + "&display=swap";
    document.head.appendChild(link);
  }
  return f.css;
}

const LEGENDA_FONTES = { mensagem: "chat", like: "likes", presente: "presente", seguidor: "seguidor", compartilhamento: "compartilhar" };

// converte "#1D9E75" em "29, 158, 117" pra usar em rgba(...)
function hexParaRgb(hex) {
  const limpo = String(hex).replace("#", "");
  const cheio = limpo.length === 3 ? limpo.split("").map(c => c + c).join("") : limpo;
  const n = parseInt(cheio, 16);
  if (isNaN(n)) return "255, 255, 255";
  return `${(n >> 16) & 255}, ${(n >> 8) & 255}, ${n & 255}`;
}

// anima um número de "de" até "para" dentro do texto de um elemento
function animarNumero(el, de, para, duracaoMs) {
  duracaoMs = duracaoMs || 500;
  if (!el || de === para) { if (el) el.textContent = para; return; }
  const inicio = performance.now();
  function passo(agora) {
    const progresso = Math.min(1, (agora - inicio) / duracaoMs);
    const facilitado = 1 - Math.pow(1 - progresso, 3);
    el.textContent = Math.round(de + (para - de) * facilitado);
    if (progresso < 1) requestAnimationFrame(passo);
    else el.textContent = para;
  }
  requestAnimationFrame(passo);
}

// markup de um switch liga/desliga
function toggleHtml(id, label, checked) {
  return `<label class="toggle"><input type="checkbox" id="${id}" ${checked ? "checked" : ""}/><span class="trilha"></span>${label}</label>`;
}

// gera o HTML da grade de tiers (usado só na prévia estática do painel)
function gerarHtmlTiers(tema, tiers, pontosMap) {
  const raioCard = Math.max(4, tema.raio - 4);
  return `<div style="display:grid;grid-template-columns:repeat(${tiers.length},1fr);gap:10px;">` +
    tiers.map(tier => {
      const atual = pontosMap[tier.id] || 0;
      const batido = atual >= tier.pontos;
      const pct = Math.min(100, (atual / tier.pontos) * 100);
      const fonteTxt = tier.fontes.map(f => LEGENDA_FONTES[f] || f).join(" + ");
      const fundoCard = batido ? tema.corPrimaria : tema.corCard;
      const corTitulo = batido ? tema.corFundo : tema.corTexto;
      const corSub = batido ? tema.corFundo : tema.corTextoSec;
      const bordaCard = batido ? "none" : `1px solid ${tema.corBorda}`;
      return `
        <div style="border-radius:${raioCard}px;padding:12px 14px;background:${fundoCard};border:${bordaCard};">
          <div style="font-size:13px;color:${corTitulo};font-weight:bold;">${tier.nome}</div>
          <div style="font-size:11px;color:${corSub};margin:2px 0 8px;">via ${fonteTxt}</div>
          <div style="height:6px;background:rgba(255,255,255,0.15);border-radius:4px;overflow:hidden;">
            <div style="height:100%;width:${pct}%;background:${batido ? tema.corFundo : tema.corPrimaria};"></div>
          </div>
          <div style="font-size:11px;color:${corSub};margin-top:6px;">${atual}/${tier.pontos} pts${batido ? " · concluído" : ""}</div>
        </div>
      `;
    }).join("") + `</div>`;
}

// gera o HTML do ranking (preview estática do painel E overlay ao vivo)
// posicoesAnteriores: mapa userId -> posição anterior (pra mostrar seta de subida/queda)
// animar: liga/desliga a entrada animada das linhas
function gerarHtmlRanking(tema, lista, posicoesAnteriores, animar) {
  posicoesAnteriores = posicoesAnteriores || {};
  animar = animar !== false;
  if (lista.length === 0) {
    return `<div style="font-size:13px;color:${tema.corTextoSec};">aguardando pontos...</div>`;
  }
  return lista.map((u, i) => {
    const posAnterior = posicoesAnteriores[u.id];
    let seta = "";
    if (posAnterior !== undefined) {
      if (posAnterior > i) seta = `<span style="color:#3ecf8e;font-size:10px;margin-right:4px;">▲</span>`;
      else if (posAnterior < i) seta = `<span style="color:#e0637a;font-size:10px;margin-right:4px;">▼</span>`;
    }
    const classeAnim = animar ? ' class="linha-ranking-anim"' : "";
    const atraso = animar ? `animation-delay:${i * 45}ms;` : "";
    const borda = i < lista.length - 1 ? `border-bottom:1px solid ${tema.corBorda};` : "";
    return `
      <div${classeAnim} style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;${atraso}${borda}">
        <span style="font-size:14px;color:${tema.corTexto};display:flex;align-items:center;">
          <span style="display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:${tema.corPrimaria}33;color:${tema.corPrimaria};font-size:11px;font-weight:700;margin-right:8px;flex-shrink:0;">${i + 1}</span>
          ${seta}${u.nickname}
        </span>
        <span style="font-size:13px;color:${tema.corPrimaria};font-weight:bold;">${u.pontos} pts</span>
      </div>
    `;
  }).join("");
}

document.body.style.margin = "0";
document.body.style.background = "transparent";
document.body.style.fontFamily = "Arial, sans-serif";
document.body.style.color = "#fff";

const params = new URLSearchParams(location.search);
const view = params.get("view");

if (!view) {
  renderPainel();
} else if (view === "metas") {
  renderMetas();
} else if (view === "ranking") {
  renderRanking();
} else if (view === "alerta") {
  renderAlerta();
} else if (view === "combo") {
  renderCombo();
} else {
  document.body.innerHTML = "<div style='padding:20px;'>overlay desconhecido: " + view + "</div>";
}

/* ============================================================
   PAINEL — lista de overlays + configurações + tema
   ============================================================ */
function renderPainel() {
  document.body.style.background = "var(--bg)";
  document.body.style.minHeight = "100vh";
  document.body.style.fontFamily = "var(--font-display)";
  document.body.style.color = "var(--text)";

  const cfg = carregarConfig();
  let apiComboPreview; // recriada em renderPrevias() sempre que o tema muda

  const SECOES = [
    { id: "links",      label: "Links",       icone: "🔗", cor: "var(--ic-links)" },
    { id: "previa",     label: "Prévia",       icone: "▣", cor: "var(--ic-previa)" },
    { id: "aparencia",  label: "Aparência",    icone: "◐", cor: "var(--ic-aparencia)" },
    { id: "config",     label: "Config",       icone: "⚙", cor: "var(--ic-config)" },
  ];

  const shell = document.createElement("div");
  shell.className = "app-shell";
  document.body.appendChild(shell);

  // -------- topbar --------
  shell.innerHTML = `
    <div class="topbar">
      <div class="topbar-logo">TS</div>
      <div class="topbar-title">TTK Studio</div>
    </div>
  `;

  const layout = document.createElement("div");
  layout.className = "painel-layout";
  shell.appendChild(layout);

  // -------- sidebar (trilha de ícones) --------
  const sidebar = document.createElement("div");
  sidebar.className = "painel-sidebar";
  layout.appendChild(sidebar);

  SECOES.forEach((s, i) => {
    const btn = document.createElement("button");
    btn.className = "nav-item" + (i === 0 ? " ativo" : "");
    btn.dataset.secao = s.id;
    btn.innerHTML = `<span class="nav-icon" style="background:${s.cor};">${s.icone}</span><span class="nav-label">${s.label}</span>`;
    sidebar.appendChild(btn);
  });
  const nav = sidebar;

  // -------- área principal --------
  const wrap = document.createElement("div");
  wrap.className = "painel-main";
  layout.appendChild(wrap);

  wrap.innerHTML = `
    <div style="padding-bottom:22px;">
      <h1 style="font-size:26px;font-weight:700;margin:0 0 8px;letter-spacing:-0.01em;">Overlays da live</h1>
      <p style="font-size:14px;color:var(--text-dim);margin:0 0 4px;max-width:540px;line-height:1.5;">Copie o link de cada overlay pro TikTok Studio ou OBS, ajuste a aparência e as regras de pontuação — tudo fica salvo neste navegador.</p>
    </div>
  `;

  function criarSecao(id) {
    const sec = document.createElement("div");
    sec.className = "secao-conteudo" + (id === "links" ? "" : " oculto");
    sec.id = "secao-" + id;
    wrap.appendChild(sec);
    return sec;
  }

  nav.querySelectorAll(".nav-item").forEach(btn => {
    btn.addEventListener("click", () => {
      nav.querySelectorAll(".nav-item").forEach(b => b.classList.remove("ativo"));
      btn.classList.add("ativo");
      SECOES.forEach(s => document.getElementById("secao-" + s.id).classList.add("oculto"));
      const alvo = document.getElementById("secao-" + btn.dataset.secao);
      alvo.classList.remove("oculto");
      alvo.classList.remove("secao-conteudo");
      void alvo.offsetWidth;
      alvo.classList.add("secao-conteudo");
    });
  });

  // ============================================================
  // SEÇÃO: Links dos overlays
  // ============================================================
  const secaoLinks = criarSecao("links");
  secaoLinks.innerHTML = `<h2 style="font-size:19px;font-weight:600;margin:0 0 4px;letter-spacing:-0.005em;">Links dos overlays</h2><p style="font-size:13px;color:var(--text-dim);margin:0 0 16px;">Um Browser Source por overlay. Use o "link de teste" pra testar no OBS/TikTok Studio sem precisar estar ao vivo — ele gera eventos falsos sozinho, sem depender do TikFinity.</p>`;

  const listaWrap = document.createElement("div");
  listaWrap.style.cssText = "display:flex;flex-direction:column;gap:10px;";
  secaoLinks.appendChild(listaWrap);

  OVERLAYS.forEach(ov => {
    const link = location.origin + location.pathname + "?view=" + ov.id;
    const linkTeste = link + "&sim=1";
    const card = document.createElement("div");
    card.className = "painel-card";
    card.style.cssText = "padding:16px 18px;display:flex;justify-content:space-between;align-items:center;gap:16px;border-top:3px solid var(--ic-links);";
    card.innerHTML = `
      <div style="min-width:0;">
        <div style="font-size:14px;font-weight:600;margin-bottom:3px;">${ov.nome}</div>
        <div style="font-size:12px;color:var(--text-dim);margin-bottom:5px;">${ov.desc}</div>

function copiarTexto(texto) {
  const temp = document.createElement("textarea");
  temp.value = texto;
  temp.style.position = "fixed";
  temp.style.opacity = "0";
  document.body.appendChild(temp);
  temp.select();
  try { document.execCommand("copy"); } catch (e) {}
  document.body.removeChild(temp);
}

/* ============================================================
   SIMULADOR DE EVENTOS (modo de teste, sem precisar de live)
   - ativado com ?sim=1 no final do link do overlay
   - gera eventos falsos (chat, like, presente, seguidor,
   compartilhar) em intervalos aleatórios, então dá pra testar
   qualquer overlay no OBS/TikTok Studio com a live apagada e o
   TikFinity fechado.
   ============================================================ */
function gerarEventoFake() {
  const nicks = ["ana_lives", "joao22", "gamer_br", "luiza.ttk", "pedro_streams", "maria123", "lucas_gg", "bia_fan"];
  const sorteio = Math.random() * 100;
  const nickname = nicks[Math.floor(Math.random() * nicks.length)];
  const userId = "teste_" + nickname;
  if (sorteio < 38) {
    return { event: "chat", data: { userId, nickname, comment: "mensagem de teste" } };
  } else if (sorteio < 68) {
    return { event: "like", data: { userId, nickname, likeCount: Math.floor(Math.random() * 30) + 1 } };
  } else if (sorteio < 88) {
    const opcoesDiamantes = [1, 1, 5, 5, 10, 10, 20, 50, 100, 500, 1000];
    const diamantes = opcoesDiamantes[Math.floor(Math.random() * opcoesDiamantes.length)];
    return { event: "gift", data: { userId, nickname, diamondCount: diamantes, repeatCount: 1 } };
  } else if (sorteio < 96) {
    return { event: "follow", data: { userId, nickname, followRole: 1 } };
  } else {
    return { event: "share", data: { userId, nickname } };
  }
}

function iniciarSimulador(processarEvento, opcoes) {
  const min = (opcoes && opcoes.min) || 1200;
  const max = (opcoes && opcoes.max) || 3000;
  console.log("[modo teste] gerando eventos falsos automaticamente — sem live e sem TikFinity");
  processarEvento(gerarEventoFake());
  setInterval(() => processarEvento(gerarEventoFake()), min + Math.random() * (max - min));
}

// conecta no TikFinity e repassa cada evento recebido pra função aoReceber
function conectarTikFinity(cfg, tag, aoReceber) {
  function conectar() {
    const ws = new WebSocket(cfg.tikfinityWsUrl);
    ws.onopen = () => console.log(`[${tag}] conectado ao TikFinity`);
    ws.onmessage = (msg) => {
      let payload;
      try { payload = JSON.parse(msg.data); } catch (e) { return; }
      aoReceber(payload);
    };
    ws.onclose = () => setTimeout(conectar, 3000);
    ws.onerror = () => ws.close();
  }
  conectar();
}

// monta os cards de tier uma única vez como DOM real (não string),
// pra poder animar largura da barra e o número sem recriar tudo
function montarPainelTiers(container, tema, tiers) {
  const grid = document.createElement("div");
  grid.style.cssText = `display:grid;grid-template-columns:repeat(${tiers.length},1fr);gap:10px;`;
  const refs = {};
  tiers.forEach(tier => {
    const raioCard = Math.max(4, tema.raio - 4);
    const fonteTxt = tier.fontes.map(f => LEGENDA_FONTES[f] || f).join(" + ");
    const card = document.createElement("div");
    card.style.cssText = `position:relative;border-radius:${raioCard}px;padding:12px 14px;background:${tema.corCard};border:1px solid ${tema.corBorda};transition:background 0.4s ease, border-color 0.4s ease;`;
    card.innerHTML = `
      <div class="tier-titulo" style="font-size:13px;color:${tema.corTexto};font-weight:bold;transition:color 0.4s ease;">${tier.nome}</div>
      <div class="tier-sub" style="font-size:11px;color:${tema.corTextoSec};margin:2px 0 8px;transition:color 0.4s ease;">via ${fonteTxt}</div>
      <div style="height:6px;border-radius:4px;overflow:hidden;background:rgba(255,255,255,0.15);">
        <div class="tier-barra" style="height:100%;width:0%;background:${tema.corPrimaria};transition:width 0.6s cubic-bezier(.22,1,.36,1);"></div>
      </div>
      <div class="tier-sub" style="font-size:11px;color:${tema.corTextoSec};margin-top:6px;transition:color 0.4s ease;"><span class="tier-atual">0</span>/${tier.pontos} pts<span class="tier-selo"></span></div>
    `;
    grid.appendChild(card);
    refs[tier.id] = {
      card,
      barra: card.querySelector(".tier-barra"),
      atualEl: card.querySelector(".tier-atual"),
      seloEl: card.querySelector(".tier-selo"),
      subEls: card.querySelectorAll(".tier-sub"),
      tituloEl: card.querySelector(".tier-titulo"),
      batido: false,
      valorAtual: 0,
    };
  });
  container.appendChild(grid);
  return refs;
}

function dispararConfete(container, cor) {
  const camada = document.createElement("div");
  camada.style.cssText = "position:absolute;left:50%;top:40%;width:0;height:0;pointer-events:none;";
  for (let i = 0; i < 12; i++) {
    const p = document.createElement("span");
    const ang = Math.random() * Math.PI * 2;
    const dist = 26 + Math.random() * 34;
    const tx = Math.cos(ang) * dist;
    const ty = Math.sin(ang) * dist;
    p.style.cssText = `position:absolute;left:0;top:0;width:6px;height:6px;border-radius:2px;background:${Math.random() > 0.5 ? cor : "#fff"};--tx:${tx}px;--ty:${ty}px;--rot:${Math.round(Math.random() * 360)}deg;animation:confetePop 0.7s ease-out forwards;`;
    camada.appendChild(p);
  }
  container.appendChild(camada);
  setTimeout(() => camada.remove(), 750);
}

function atualizarTier(ref, tier, tema, novoValor, animacoesAtivas) {
  const pct = Math.min(100, (novoValor / tier.pontos) * 100);
  ref.barra.style.width = pct + "%";
  if (animacoesAtivas) animarNumero(ref.atualEl, ref.valorAtual, novoValor, 500);
  else ref.atualEl.textContent = novoValor;

  const jaBatido = novoValor >= tier.pontos;
  if (jaBatido && !ref.batido) {
    ref.card.style.background = tema.corPrimaria;
    ref.card.style.borderColor = "transparent";
    ref.tituloEl.style.color = tema.corFundo;
    ref.subEls.forEach(el => (el.style.color = tema.corFundo));
    ref.seloEl.textContent = " · concluído";
    if (animacoesAtivas) {
      ref.card.style.setProperty("--glow-color", `rgba(${hexParaRgb(tema.corPrimaria)}, .55)`);
      ref.card.classList.remove("anim-glow");
      void ref.card.offsetWidth;
      ref.card.classList.add("anim-glow");
      dispararConfete(ref.card, tema.corPrimaria);
    }
  } else if (!jaBatido && ref.batido) {
    ref.card.style.background = tema.corCard;
    ref.card.style.borderColor = tema.corBorda;
    ref.tituloEl.style.color = tema.corTexto;
    ref.subEls.forEach(el => (el.style.color = tema.corTextoSec));
    ref.seloEl.textContent = "";
  }
  ref.batido = jaBatido;
  ref.valorAtual = novoValor;
}

function renderMetas() {
  const cfg = carregarConfig();
  const t = cfg.tema;
  const fonteCss = carregarFonteGoogle(t.fonte);
  document.body.style.fontFamily = fonteCss;

  const fontesPossiveis = ["mensagem", "like", "presente", "seguidor", "compartilhamento"];
  let liveState = Object.fromEntries(fontesPossiveis.map(f => [f, 0]));
  let mensalState = JSON.parse(localStorage.getItem("mensalPorFonte") || "null")
    || Object.fromEntries(fontesPossiveis.map(f => [f, 0]));

  const mesSalvo = localStorage.getItem("mesReferencia");
  const mesAtual = new Date().getMonth() + "-" + new Date().getFullYear();
  if (mesSalvo !== mesAtual) {
    mensalState = Object.fromEntries(fontesPossiveis.map(f => [f, 0]));
    localStorage.setItem("mesReferencia", mesAtual);
  }
  function salvarMensal() { localStorage.setItem("mensalPorFonte", JSON.stringify(mensalState)); }
  function pontosDoTier(tier) {
    const state = tier.escopo === "live" ? liveState : mensalState;
    return tier.fontes.reduce((s, f) => s + (state[f] || 0), 0);
  }

  const root = document.createElement("div");
  root.style.cssText = `background:${t.corFundo};border-radius:${t.raio}px;padding:22px 26px 26px;font-family:${fonteCss};`;
  document.body.appendChild(root);

  const refsTiers = montarPainelTiers(root, t, cfg.tiers);

  function render() {
    cfg.tiers.forEach(tier => {
      atualizarTier(refsTiers[tier.id], tier, t, pontosDoTier(tier), cfg.animacoes);
    });
  }
  render();

  function processarEventoMetas(payload) {
    console.log("[overlay-metas] evento:", payload);
    const tipo = payload.event;
    const data = payload.data || {};
    const v = cfg.valores;
    if (tipo === "gift") {
      const diamantes = data.diamondCount ?? data.diamonds ?? data.value ?? 0;
      const repeticoes = data.repeatCount ?? data.combo ?? 1;
      const ganhos = diamantes * repeticoes * v.presente;
      liveState.presente += ganhos;
      mensalState.presente += ganhos;
      salvarMensal();
    }
    if (tipo === "chat" || tipo === "comment") liveState.mensagem += v.mensagem;
    if (tipo === "like") {
      const qtd = data.likeCount ?? data.count ?? 1;
      liveState.like += Math.floor(qtd / v.likeACada) * v.likeValor;
    }
    if (tipo === "follow" || tipo === "member") liveState.seguidor += v.seguidor;
    if (tipo === "share") liveState.compartilhamento += v.compartilhamento;
    render();
  }

  if (params.get("sim") === "1") {
    iniciarSimulador(processarEventoMetas);
  } else {
    conectarTikFinity(cfg, "overlay-metas", processarEventoMetas);
  }
}

/* ============================================================
   OVERLAY: RANKING
   ============================================================ */
function renderRanking() {
  const cfg = carregarConfig();
  const t = cfg.tema;
  const fonteCss = carregarFonteGoogle(t.fonte);
  document.body.style.fontFamily = fonteCss;

  let ranking = JSON.parse(localStorage.getItem("rankingUsuarios") || "{}");
  let seguidoresConhecidos = JSON.parse(localStorage.getItem("seguidoresConhecidos") || "{}");
  function salvarRanking() { localStorage.setItem("rankingUsuarios", JSON.stringify(ranking)); }
  function salvarSeguidores() { localStorage.setItem("seguidoresConhecidos", JSON.stringify(seguidoresConhecidos)); }

  function ehSeguidor(userId, data) {
    if (typeof data.followRole === "number") {
      if (data.followRole >= 1) { seguidoresConhecidos[userId] = true; salvarSeguidores(); }
      return data.followRole >= 1;
    }
    if (typeof data.isFollower === "boolean") {
      if (data.isFollower) { seguidoresConhecidos[userId] = true; salvarSeguidores(); }
      return data.isFollower;
    }
    return !!seguidoresConhecidos[userId];
  }
  function somar(userId, nickname, pontos) {
    if (!ranking[userId]) ranking[userId] = { nickname, pontos: 0 };
    ranking[userId].nickname = nickname || ranking[userId].nickname;
    ranking[userId].pontos += pontos;
    salvarRanking();
  }

  const root = document.createElement("div");
  root.style.cssText = `background:${t.corFundo};border-radius:${t.raio}px;padding:18px 22px;max-width:320px;font-family:${fonteCss};`;
  document.body.appendChild(root);
  root.innerHTML = `<div style="font-size:12px;color:${t.corTextoSec};margin-bottom:10px;text-transform:uppercase;letter-spacing:0.05em;">Top seguidores da live</div><div id="lista"></div>`;

  let ultimoTop = [];
  function render() {
    const mapaAntigo = {};
    ultimoTop.forEach((u, i) => { mapaAntigo[u.id] = i; });
    const top = Object.entries(ranking)
      .map(([id, u]) => ({ id, nickname: u.nickname, pontos: u.pontos }))
      .sort((a, b) => b.pontos - a.pontos)
      .slice(0, cfg.tamanhoRanking);
    document.getElementById("lista").innerHTML = gerarHtmlRanking(t, top, mapaAntigo, cfg.animacoes);
    ultimoTop = top;
  }
  render();

  function processarEventoRanking(payload) {
    console.log("[overlay-ranking] evento:", payload);
    const tipo = payload.event;
    const data = payload.data || {};
    const v = cfg.valores;
    const userId = data.userId ?? data.uniqueId ?? data.user?.userId ?? data.user?.uniqueId;
    const nickname = data.nickname ?? data.user?.nickname ?? data.uniqueId ?? "espectador";
    if (!userId) return;
    if (tipo === "follow") { seguidoresConhecidos[userId] = true; salvarSeguidores(); }
    const conta = !cfg.exigirSeguidor || ehSeguidor(userId, data);
    if (!conta) return;
    if (tipo === "gift") {
      const diamantes = data.diamondCount ?? data.diamonds ?? data.value ?? 0;
      const repeticoes = data.repeatCount ?? data.combo ?? 1;
      somar(userId, nickname, diamantes * repeticoes * v.presente);
    }
    if (tipo === "chat" || tipo === "comment") somar(userId, nickname, v.mensagem);
    if (tipo === "like") {
      const qtd = data.likeCount ?? data.count ?? 1;
      const ganhos = Math.floor(qtd / v.likeACada) * v.likeValor;
      if (ganhos > 0) somar(userId, nickname, ganhos);
    }
    if (tipo === "follow" || tipo === "member") somar(userId, nickname, v.seguidor);
    if (tipo === "share") somar(userId, nickname, v.compartilhamento);
    render();
  }

  if (params.get("sim") === "1") {
    iniciarSimulador(processarEventoRanking);
  } else {
    conectarTikFinity(cfg, "overlay-ranking", processarEventoRanking);
  }
}

// gerencia uma fila de cards de alerta dentro de "container"
// (usado no overlay de verdade e também na prévia do painel)
function criarNoAlerta(container) {
  const fila = [];
  let mostrando = false;

  function processarFila() {
    if (mostrando || fila.length === 0) return;
    mostrando = true;
    const { nickname, valor, recorde, tema, duracaoMs } = fila.shift();
    const raioCard = Math.max(8, tema.raio);
    const cartao = document.createElement("div");
    cartao.style.cssText = `display:flex;align-items:center;gap:12px;padding:14px 18px;border-radius:${raioCard}px;background:${tema.corCard};border:1px solid ${recorde ? tema.corPrimaria : tema.corBorda};box-shadow:0 10px 30px rgba(0,0,0,.35);animation:slideInTop 0.35s cubic-bezier(.22,1,.36,1) both;`;
    cartao.innerHTML = `
      <div style="width:38px;height:38px;flex-shrink:0;border-radius:50%;background:${tema.corPrimaria};display:flex;align-items:center;justify-content:center;font-size:18px;">🎁</div>
      <div style="min-width:0;">
        <div style="font-size:12px;color:${tema.corTextoSec};">${recorde ? "🏆 maior presente da live" : "novo presente"}</div>
        <div style="font-size:15px;color:${tema.corTexto};font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${nickname} <span style="color:${tema.corPrimaria};">· ${valor} pts</span></div>
      </div>
    `;
    container.appendChild(cartao);
    setTimeout(() => {
      cartao.style.animation = "slideOutTop 0.3s ease both";
      setTimeout(() => {
        cartao.remove();
        mostrando = false;
        processarFila();
      }, 300);
    }, duracaoMs);
  }

  return {
    mostrar(nickname, valor, recorde, tema, duracaoMs) {
      fila.push({ nickname, valor, recorde, tema, duracaoMs });
      processarFila();
    },
  };
}

function renderAlerta() {
  const cfg = carregarConfig();
  const t = cfg.tema;
  const fonteCss = carregarFonteGoogle(t.fonte);
  document.body.style.fontFamily = fonteCss;

  const root = document.createElement("div");
  root.style.cssText = "display:flex;flex-direction:column;gap:10px;max-width:360px;";
  document.body.appendChild(root);
  const api = criarNoAlerta(root);
  let recordeAtual = 0;

  function processarEventoAlerta(payload) {
    if (payload.event !== "gift" || !cfg.alerta.ativo) return;
    const data = payload.data || {};
    const diamantes = data.diamondCount ?? data.diamonds ?? data.value ?? 0;
    const repeticoes = data.repeatCount ?? data.combo ?? 1;
    const valor = diamantes * repeticoes * cfg.valores.presente;
    if (valor < cfg.alerta.valorMinimo) return;
    const nickname = data.nickname ?? data.user?.nickname ?? data.uniqueId ?? "espectador";
    const ehRecorde = valor > recordeAtual;
    if (ehRecorde) recordeAtual = valor;
    api.mostrar(nickname, valor, ehRecorde, t, cfg.alerta.duracaoMs);
  }

  if (params.get("sim") === "1") {
    iniciarSimulador(processarEventoAlerta, { min: 900, max: 2200 });
  } else {
    conectarTikFinity(cfg, "overlay-alerta", processarEventoAlerta);
  }
}

// cria a caixinha de combo dentro de "container" e devolve uma API
// pra registrar eventos (usado no overlay de verdade e na prévia)
function criarNoCombo(container, tema) {
  const caixa = document.createElement("div");
  caixa.style.cssText = `display:none;align-items:baseline;gap:8px;padding:10px 18px;border-radius:${Math.max(8, tema.raio)}px;background:${tema.corCard};border:1px solid ${tema.corBorda};width:fit-content;`;
  caixa.innerHTML = `<span class="combo-numero" style="font-size:24px;font-weight:800;color:${tema.corPrimaria};">0</span><span style="font-size:11px;color:${tema.corTextoSec};text-transform:uppercase;letter-spacing:0.05em;">combo</span>`;
  container.appendChild(caixa);
  const numeroEl = caixa.querySelector(".combo-numero");

  let contagem = 0;
  let ultimoTimestamp = 0;
  let timerEsconder = null;

  return {
    registrarEvento(janelaMs, animacoesAtivas) {
      const agora = Date.now();
      contagem = (agora - ultimoTimestamp > janelaMs) ? 1 : contagem + 1;
      ultimoTimestamp = agora;
      numeroEl.textContent = contagem;
      caixa.style.display = contagem >= 2 ? "flex" : "none";
      if (animacoesAtivas) {
        numeroEl.classList.remove("anim-pop");
        void numeroEl.offsetWidth;
        numeroEl.classList.add("anim-pop");
      }
      clearTimeout(timerEsconder);
      timerEsconder = setTimeout(() => { caixa.style.display = "none"; contagem = 0; }, janelaMs);
    },
  };
}

function renderCombo() {
  const cfg = carregarConfig();
  const t = cfg.tema;
  const fonteCss = carregarFonteGoogle(t.fonte);
  document.body.style.fontFamily = fonteCss;

  const root = document.createElement("div");
  document.body.appendChild(root);
  const api = criarNoCombo(root, t);

  function processarEventoCombo(payload) {
    if (!cfg.combo.ativo) return;
    const tipo = payload.event === "comment" ? "chat" : payload.event === "member" ? "follow" : payload.event;
    if (!cfg.combo.fontes.includes(tipo)) return;
    api.registrarEvento(cfg.combo.janelaMs, cfg.animacoes);
  }

  if (params.get("sim") === "1") {
    iniciarSimulador(processarEventoCombo, { min: 400, max: 1000 });
  } else {
    conectarTikFinity(cfg, "overlay-combo", processarEventoCombo);
  }
}
