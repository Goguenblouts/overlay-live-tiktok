<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Central de Overlays - Live TikTok</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --bg: #0e0e10;
    --bg-alt: #16161a;
    --surface: #1a1a1e;
    --surface-hover: #212126;
    --border: #2a2a30;
    --accent: #F0464B;
    --accent-dim: #8a2c30;
    --text: #f3f4f2;
    --text-dim: #93939a;
    --text-faint: #56565e;
    --grad-start: #D61F93;
    --grad-end: #7C22C8;
    --ic-links: #F0464B;
    --ic-previa: #2F9BD6;
    --ic-aparencia: #9B5DE5;
    --ic-config: #28C48A;
    --ic-eventos: #F0A63C;
    --ic-simulador: #2FD68A;
    --font-display: 'Space Grotesk', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }
  * { box-sizing: border-box; }
  body { background: var(--bg); }
  ::selection { background: var(--accent); color: #ffffff; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
  a { color: var(--accent); }
  input:focus-visible, select:focus-visible, button:focus-visible, textarea:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }
  button { font-family: var(--font-display); transition: transform 0.12s ease, background 0.12s ease, border-color 0.12s ease; }
  button:hover { transform: translateY(-1px); }
  button:active { transform: translateY(0); }
  input[type="text"], input[type="number"], select {
    font-family: var(--font-mono);
  }
  .painel-card {
    background: rgba(26, 26, 30, 0.72);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--border);
    border-radius: 10px;
    transition: border-color 0.15s ease;
  }
  .painel-card:hover { border-color: var(--text-faint); }
  .card-clicavel { cursor: pointer; transition: border-color 0.15s ease, transform 0.15s ease, background 0.15s ease; }
  .card-clicavel:hover { border-color: var(--ic-eventos); transform: translateY(-2px); background: rgba(38,38,44,0.85); }
  .plataforma-pill {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--bg-alt); border: 1px solid var(--border); border-radius: 999px;
    padding: 7px 14px; font-size: 12.5px; color: var(--text-dim);
  }
  /* ---- cards de prêmio com gradiente por raridade (estilo item-shop) ---- */
  .card-raridade {
    position: relative;
    overflow: hidden;
    border-width: 1.5px !important;
  }
  .card-raridade::before {
    content: "";
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(135deg, transparent, transparent 10px, rgba(255,255,255,0.025) 10px, rgba(255,255,255,0.025) 20px);
    pointer-events: none;
  }
  .signal-bar {
    height: 2px;
    width: 100%;
    background: linear-gradient(90deg, transparent, var(--accent-dim), var(--accent), var(--accent-dim), transparent);
    background-size: 200% 100%;
    animation: signal-sweep 3.5s ease-in-out infinite;
    border-radius: 2px;
  }
  @keyframes signal-sweep {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  @media (prefers-reduced-motion: reduce) {
    .signal-bar { animation: none; background-position: 0 0; }
    button:hover { transform: none; }
  }
  .signal-bar { display: none; }
  .topbar {
    height: 64px;
    background: linear-gradient(90deg, var(--grad-start), var(--grad-end));
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 28px;
    flex-shrink: 0;
  }
  .topbar-logo {
    width: 34px; height: 34px; border-radius: 10px;
    background: rgba(255,255,255,0.22);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: #fff;
  }
  .topbar-title { color: #fff; font-weight: 700; font-size: 17px; letter-spacing: -0.01em; }
  .topbar-sub { color: rgba(255,255,255,0.75); font-size: 11.5px; font-weight: 500; letter-spacing: 0.02em; text-transform: uppercase; }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; position: relative; }
  .topbar-btn {
    background: rgba(255,255,255,0.14); border: 1px solid rgba(255,255,255,0.2); color: #fff;
    border-radius: 8px; padding: 8px 13px; font-size: 12.5px; font-weight: 600; cursor: pointer;
    display: inline-flex; align-items: center; gap: 7px; font-family: var(--font-display);
    text-decoration: none; white-space: nowrap;
  }
  .topbar-btn:hover { background: rgba(255,255,255,0.22); transform: none; }
  .topbar-btn-doar { background: rgba(255,255,255,0.94); color: #c0295a !important; }
  .topbar-btn-doar:hover { background: #fff; }
  .topbar-dropdown {
    position: absolute; top: 46px; right: 0; min-width: 220px; max-width: 280px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 8px; box-shadow: 0 12px 28px rgba(0,0,0,0.35); z-index: 40;
  }
  .topbar-dropdown a {
    display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 7px;
    color: var(--text); font-size: 13px; text-decoration: none;
  }
  .topbar-dropdown a:hover { background: var(--surface-hover); }
  .topbar-dropdown p { font-size: 12px; color: var(--text-faint); margin: 4px 8px; }
  .topbar-modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 90;
    display: flex; align-items: center; justify-content: center;
  }
  .topbar-modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 24px; max-width: 380px; width: calc(100% - 40px);
  }
  .app-shell { display: flex; flex-direction: column; min-height: 100vh; }
  .painel-layout { display: flex; flex: 1; min-height: 0; justify-content: center; }
  .painel-sidebar {
    width: 84px;
    flex-shrink: 0;
    background: var(--bg-alt);
    border-right: 1px solid var(--border);
    padding: 18px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .painel-main { flex: 1; min-width: 0; padding: 44px 48px 88px; max-width: 1180px; }
  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    width: 100%;
    background: transparent;
    border: none;
    border-radius: 14px;
    padding: 10px 4px;
    cursor: pointer;
    font-family: var(--font-display);
    text-align: center;
  }
  .nav-item:hover { background: var(--surface-hover); transform: none; }
  .nav-item.ativo { background: var(--accent); box-shadow: none; }
  .nav-icon {
    width: auto; height: auto; border-radius: 0; flex-shrink: 0;
    background: transparent !important;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim); font-size: 19px; font-weight: 400;
    opacity: 1;
    transition: color 0.15s ease;
  }
  .nav-item.ativo .nav-icon { color: #fff !important; }
  .nav-label {
    font-size: 10px; font-weight: 600; color: var(--text-faint);
    line-height: 1.2; max-width: 100%; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  .nav-item.ativo .nav-label { color: #fff; }
  .sidebar-sync {
    margin-top: auto;
    width: 38px; height: 38px; border-radius: 50%;
    background: rgba(240,70,75,0.12);
    border: 1px solid rgba(240,70,75,0.28);
    display: flex; align-items: center; justify-content: center;
    color: var(--acc2, #f0464b);
    font-size: 14px;
    cursor: default;
  }
  .btn-cta {
    background: linear-gradient(90deg, var(--grad-start), var(--grad-end));
    color: #fff !important;
    border: none !important;
    font-weight: 700;
    box-shadow: 0 6px 18px rgba(124,34,200,0.28);
  }
  .btn-cta:hover { filter: brightness(1.08); }
  .oculto { display: none !important; }
  /* ---- sub-navegação dentro de Config (menu > submenu, tipo TikFinity) ---- */
  .config-shell { display: flex; gap: 22px; align-items: flex-start; }
  .config-subnav { display: flex; flex-direction: column; gap: 2px; width: 190px; flex-shrink: 0; }
  .config-subnav-btn {
    text-align: left; background: transparent; border: none; border-radius: 8px;
    padding: 10px 12px; font-size: 13px; font-weight: 600; color: var(--text-dim);
    cursor: pointer; font-family: var(--font-display);
  }
  .config-subnav-btn:hover { background: var(--surface-hover); transform: none; }
  .config-subnav-btn.ativo { background: var(--surface); color: var(--text); box-shadow: inset 2px 0 0 var(--ic-config); }
  .config-subpage-wrap { flex: 1; min-width: 0; }
  @media (max-width: 900px) {
    .config-shell { flex-direction: column; }
    .config-subnav { flex-direction: row; width: 100%; overflow-x: auto; gap: 6px; }
    .config-subnav-btn { flex-shrink: 0; }
  }
  @media (max-width: 900px) {
    .painel-layout { flex-direction: column; }
    .painel-sidebar {
      width: 100%;
      flex-direction: row;
      overflow-x: auto;
      padding: 10px;
      gap: 4px;
    }
    .sidebar-sync { display: none; }
    .nav-item { width: auto; flex-shrink: 0; padding: 8px 12px; }
    .nav-label { font-size: 12px; }
    .painel-main { padding: 28px 20px 56px; }
  }

  /* ---- switch (toggle) ---- */
  .toggle { position: relative; display: inline-flex; align-items: center; gap: 9px; cursor: pointer; font-size: 13px; color: var(--text); user-select: none; }
  .toggle input { display: none; }
  .toggle .trilha {
    width: 36px; height: 20px; background: var(--bg-alt); border: 1px solid var(--border);
    border-radius: 999px; position: relative; transition: background 0.15s ease, border-color 0.15s ease; flex-shrink: 0;
  }
  .toggle .trilha::after {
    content: ""; position: absolute; top: 1px; left: 1px; width: 16px; height: 16px;
    border-radius: 50%; background: var(--text-faint); transition: transform 0.15s ease, background 0.15s ease;
  }
  .toggle input:checked + .trilha { background: var(--accent); border-color: var(--accent); }
  .toggle input:checked + .trilha::after { transform: translateX(16px); background: #fff; }

  /* ---- animações compartilhadas (painel + overlays) ---- */
  @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes popScale { 0% { transform: scale(1); } 35% { transform: scale(1.18); } 100% { transform: scale(1); } }
  @keyframes glowPulse {
    0% { box-shadow: 0 0 0 0 var(--glow-color, rgba(255,255,255,.5)); }
    70% { box-shadow: 0 0 24px 12px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  @keyframes confetePop { to { transform: translate(var(--tx, 0px), var(--ty, 0px)) rotate(var(--rot, 180deg)); opacity: 0; } }
  @keyframes slideInTop { from { opacity: 0; transform: translateY(-14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideOutTop { to { opacity: 0; transform: translateY(-14px); } }
  @keyframes fadeInCard { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fadeOutCard { to { opacity: 0; } }
  @keyframes zoomInCard { from { opacity: 0; transform: scale(0.75); } to { opacity: 1; transform: scale(1); } }
  @keyframes zoomOutCard { to { opacity: 0; transform: scale(0.75); } }
  @keyframes bounceInCard {
    0% { opacity: 0; transform: scale(0.4) translateY(-30px); }
    55% { opacity: 1; transform: scale(1.08) translateY(4px); }
    75% { transform: scale(0.96) translateY(-2px); }
    100% { transform: scale(1) translateY(0); }
  }
  @keyframes bounceOutCard { to { opacity: 0; transform: scale(0.5); } }
  /* ---- animações extras (Ações da aba Eventos) ---- */
  @keyframes slideInLeft { from { opacity: 0; transform: translateX(-40px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes slideOutLeft { to { opacity: 0; transform: translateX(-40px); } }
  @keyframes slideInRight { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes slideOutRight { to { opacity: 0; transform: translateX(40px); } }
  @keyframes slideInBottom { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideOutBottom { to { opacity: 0; transform: translateY(14px); } }
  @keyframes scaleInCard { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
  @keyframes scaleOutCard { to { opacity: 0; transform: scale(0.9); } }
  @keyframes elasticInCard {
    0% { opacity: 0; transform: scale(0.3); }
    50% { opacity: 1; transform: scale(1.15); }
    70% { transform: scale(0.92); }
    85% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }
  @keyframes elasticOutCard { to { opacity: 0; transform: scale(0.3); } }
  @keyframes flipInCard { from { opacity: 0; transform: perspective(600px) rotateY(90deg); } to { opacity: 1; transform: perspective(600px) rotateY(0deg); } }
  @keyframes flipOutCard { to { opacity: 0; transform: perspective(600px) rotateY(90deg); } }
  @keyframes rotateInCard { from { opacity: 0; transform: rotate(-20deg) scale(0.8); } to { opacity: 1; transform: rotate(0deg) scale(1); } }
  @keyframes rotateOutCard { to { opacity: 0; transform: rotate(20deg) scale(0.8); } }
  @keyframes popInCard {
    0% { opacity: 0; transform: scale(0.5); }
    60% { opacity: 1; transform: scale(1.12); }
    100% { transform: scale(1); }
  }
  @keyframes popOutCard { to { opacity: 0; transform: scale(0.6); } }
  @keyframes shakeInCard {
    0% { opacity: 0; transform: translateX(0); }
    15% { opacity: 1; transform: translateX(-8px); }
    30% { transform: translateX(8px); }
    45% { transform: translateX(-6px); }
    60% { transform: translateX(6px); }
    75% { transform: translateX(-3px); }
    100% { transform: translateX(0); }
  }
  @keyframes shakeOutCard { to { opacity: 0; transform: scale(0.95); } }
  @keyframes glitchInCard {
    0% { opacity: 0; clip-path: inset(0 0 60% 0); transform: translateX(-6px); }
    20% { opacity: 1; clip-path: inset(40% 0 0 0); transform: translateX(4px); }
    40% { clip-path: inset(0 0 0 0); transform: translateX(-3px); }
    60% { transform: translateX(3px); }
    100% { transform: translateX(0); clip-path: inset(0 0 0 0); }
  }
  @keyframes glitchOutCard { to { opacity: 0; transform: translateX(6px); clip-path: inset(0 60% 0 0); } }
  .secao-conteudo { animation: fadeSlideUp 0.3s ease both; }
  .linha-ranking-anim { animation: fadeSlideUp 0.4s ease both; }
  .anim-glow { animation: glowPulse 0.9s ease-out; }
  .anim-pop { animation: popScale 0.28s ease; }
  @media (prefers-reduced-motion: reduce) {
    .secao-conteudo, .linha-ranking-anim, .anim-glow, .anim-pop { animation: none !important; }
  }
</style>
</head>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
/* ============================================================
   SYNC AUTOMÁTICO (Firebase Realtime Database)
   - Guarda a configuração geral num banco na nuvem, além do
     localStorage de cada navegador. Uma config só, sem conta —
     é uma ferramenta de um streamer só.
   - Toda vez que o painel salva, manda a config pra nuvem.
   - Toda vez que qualquer overlay (ou o próprio painel) abre,
     ele escuta essa mesma chave. Se a nuvem tiver algo diferente
     do que já está salvo localmente, atualiza e recarrega a
     página sozinho — sem precisar copiar link de novo.
   - Se der qualquer problema pra conectar (sem internet, etc),
     tudo continua funcionando do jeito antigo, só que sem o
     sync automático entre telas.
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyAZkrdcciHLXsV01nNwpvsz7MbvTQPB8uA",
  authDomain: "meus-links-c0839.firebaseapp.com",
  databaseURL: "https://meus-links-c0839-default-rtdb.firebaseio.com",
  projectId: "meus-links-c0839",
  storageBucket: "meus-links-c0839.firebasestorage.app",
  messagingSenderId: "751984968027",
  appId: "1:751984968027:web:8b870195b9ce89ad3dda7e",
};
let dbRefConfig = null;
let dbRefReset = null;
let dbRefResetLive = null;
try {
  firebase.initializeApp(firebaseConfig);
  dbRefConfig = firebase.database().ref("overlay_tiktok/config");
  dbRefReset = firebase.database().ref("overlay_tiktok/resetTrigger");
  // sinal separado do reset geral: só zera o balde "da live" (pontos de
  // mensagem/like/seguidor/compartilhamento + ranking), preserva
  // presenteMensal e os prêmios de escopo "mensal" — usado pelo botão
  // "Iniciar nova live" em Config > Zona de risco.
  dbRefResetLive = firebase.database().ref("overlay_tiktok/resetLiveTrigger");
} catch (e) {
  console.warn("[firebase] não consegui iniciar o sync automático:", e);
}

/* ============================================================
   CENTRAL DE OVERLAYS
   - sem parâmetro na URL: mostra o painel (lista + config + tema)
   - ?view=metas    : overlay das metas da live (Browser Source)
   - ?view=ranking  : overlay do ranking de seguidores (Browser Source)
   - ?view=alerta   : overlay que mostra um card quando chega um
                      presente grande (Browser Source à parte)
   - ?view=combo    : overlay com contador de combo/sequência
                      (Browser Source à parte)
   - acrescente &sim=1 no final de qualquer link acima pra testar
     sem live e sem o TikFinity ligado (gera eventos falsos sozinho).
   Pra criar um overlay novo no futuro: adiciona um item em
   OVERLAYS e uma função render<Nome>() seguindo o padrão dos que
   já existem. Toda a parte visual usa cfg.tema, então overlays
   novos herdam a mesma personalização de graça.
   ============================================================ */

const OVERLAYS = [
  { id: "metas",   nome: "Prêmios da live",       desc: "Avisa quando um espectador desbloqueia um prêmio" },
  { id: "ranking", nome: "Ranking de seguidores", desc: "Top espectadores por pontos" },
  { id: "alerta",  nome: "Alerta de presente",    desc: "Card temporário quando chega um presente grande" },
  { id: "combo",   nome: "Combo / sequência",     desc: "Contador ao vivo de likes e presentes em sequência" },
  { id: "vitrine", nome: "Vitrine de prêmios",    desc: "Lista dos prêmios passando em loop na tela, da direita pra esquerda" },
  { id: "eventos", nome: "Eventos personalizados", desc: "Dispara as regras (gatilho → ação) criadas na aba Eventos" },
];

const PRESETS_TEMA = {
  "Verde neon":       { corPrimaria: "#1D9E75", corFundo: "#0d1512", corCard: "#152420", corBorda: "#1f3a32", corTexto: "#ffffff", corTextoSec: "#8fb3a8", raio: 12, fonte: "padrao" },
  "Roxo gamer":        { corPrimaria: "#7F77DD", corFundo: "#120f1f", corCard: "#1c1830", corBorda: "#332c52", corTexto: "#ffffff", corTextoSec: "#b3aee0", raio: 14, fonte: "montserrat" },
  "Rosa vibrante":     { corPrimaria: "#D4537E", corFundo: "#1a0f14", corCard: "#2a1620", corBorda: "#4a2534", corTexto: "#ffffff", corTextoSec: "#e0a8bc", raio: 16, fonte: "poppins" },
  "Escuro minimalista": { corPrimaria: "#f5f5f0", corFundo: "#0a0a0a", corCard: "#161616", corBorda: "#2a2a2a", corTexto: "#ffffff", corTextoSec: "#8a8a85", raio: 6, fonte: "bebas" },
  "Ciano cyber":       { corPrimaria: "#22D3EE", corFundo: "#07161a", corCard: "#0f2429", corBorda: "#1b3d44", corTexto: "#ffffff", corTextoSec: "#8fd6e0", raio: 10, fonte: "montserrat" },
  "Dourado elegante":  { corPrimaria: "#F0C24B", corFundo: "#161208", corCard: "#241d0f", corBorda: "#44392a", corTexto: "#ffffff", corTextoSec: "#d9c093", raio: 8, fonte: "poppins" },
};

const FONTES = {
  padrao:     { nome: "Padrão", css: "Arial, sans-serif", googleFamily: null },
  poppins:    { nome: "Poppins", css: "'Poppins', sans-serif", googleFamily: "Poppins:wght@400;600;700" },
  montserrat: { nome: "Montserrat", css: "'Montserrat', sans-serif", googleFamily: "Montserrat:wght@400;600;700" },
  bebas:      { nome: "Bebas Neue (números grandes)", css: "'Bebas Neue', sans-serif", googleFamily: "Bebas+Neue" },
};

const CONFIG_PADRAO = {
  tikfinityWsUrl: "ws://127.0.0.1:21213/",
  valores: {
    mensagem: 1,
    likeACada: 100,
    likeValor: 5,
    presente: 1,
    seguidor: 3,
    compartilhamento: 5,
  },
  exigirSeguidor: true,
  tamanhoRanking: 5,
  // pontos de presente (gift) são dinheiro de verdade — sempre acumulam
  // no balde "mensal" (zera só na virada do mês, nunca perde entre
  // lives). Os outros tipos de evento (mensagem/like/seguidor/
  // compartilhamento) acumulam no balde "da live" (zera a cada live
  // nova). Por isso todo tier tem um escopo: "live" ou "mensal" — um
  // tier "mensal" só pode somar a fonte "presente"; um tier "live" nunca
  // pode usar "presente" como fonte (ver checarResetAutomaticoLive/Mensal
  // mais abaixo no arquivo).
  resetLive: { horasParaAutoReset: 4 },
  // cada tier é um prêmio que O ESPECTADOR ganha quando os pontos DELE

// mescla um bloco de sons salvo com o padrão, campo por campo
// (pra não perder chaves novas quando o config salvo é antigo)
function mesclarSons(padrao, salvo) {
  const out = structuredClone(padrao);
  if (!salvo) return out;
  if (typeof salvo.volume === "number") out.volume = salvo.volume;
  ["presente", "premio", "seguidor", "combo"].forEach(k => {
    if (salvo[k]) out[k] = Object.assign({}, padrao[k], salvo[k]);
  });
  return out;
}

function carregarConfig() {
  try {
    const salvo = (typeof window !== "undefined" && window.__cfgPreviewOverride) || JSON.parse(localStorage.getItem("configGeral"));
    if (!salvo) return structuredClone(CONFIG_PADRAO);
    const cfg = Object.assign(structuredClone(CONFIG_PADRAO), salvo);
    cfg.tema = Object.assign(structuredClone(CONFIG_PADRAO.tema), salvo.tema || {});
    cfg.valores = Object.assign(structuredClone(CONFIG_PADRAO.valores), salvo.valores || {});
    cfg.alerta = Object.assign(structuredClone(CONFIG_PADRAO.alerta), salvo.alerta || {});
    cfg.combo = Object.assign(structuredClone(CONFIG_PADRAO.combo), salvo.combo || {});
    cfg.metas = Object.assign(structuredClone(CONFIG_PADRAO.metas), salvo.metas || {});
    cfg.resetLive = Object.assign(structuredClone(CONFIG_PADRAO.resetLive), salvo.resetLive || {});
    // migração: tiers salvos antes do escopo live/mensal existir não têm
    // esse campo — classifica sozinho pela fonte (presente = mensal,
    // resto = live) pra não quebrar prêmios já configurados.
    cfg.tiers = (cfg.tiers || []).map(t => {
      if (t.escopo === "live" || t.escopo === "mensal") return t;
      return Object.assign({}, t, { escopo: (t.fontes || []).includes("presente") ? "mensal" : "live" });
    });
    cfg.sons = mesclarSons(CONFIG_PADRAO.sons, salvo.sons);
    cfg.animacoes = salvo.animacoes !== undefined ? salvo.animacoes : CONFIG_PADRAO.animacoes;
    cfg.overlayTema = Object.assign(structuredClone(CONFIG_PADRAO.overlayTema), salvo.overlayTema || {});
    cfg.automacoes = {
      acoes: (salvo.automacoes && salvo.automacoes.acoes) || [],
      eventos: (salvo.automacoes && salvo.automacoes.eventos) || [],
      variaveis: (salvo.automacoes && salvo.automacoes.variaveis) || [],
      filaConfig: Object.assign(structuredClone(CONFIG_PADRAO.automacoes.filaConfig), (salvo.automacoes && salvo.automacoes.filaConfig) || {}),
    };
    return cfg;
  } catch (e) {
    return structuredClone(CONFIG_PADRAO);
  }
}
function salvarConfig(cfg) {
  localStorage.setItem("configGeral", JSON.stringify(cfg));
  if (dbRefConfig) {
    dbRefConfig.set(cfg).catch(e => console.warn("[firebase] falha ao salvar na nuvem:", e));
  }
}
// Tema efetivo de um overlay: o tema global (Aparência) com a sobrescrita
// daquele overlay específico por cima, se existir (cfg.overlayTema[id]).
// Assim, mudar cor num overlay não mexe nos outros; só a Aparência muda tudo.
function temaEfetivo(cfg, overlayId) {
  const sobrescrita = (cfg.overlayTema && cfg.overlayTema[overlayId]) || {};
  return Object.assign({}, cfg.tema, sobrescrita);
}

// Codifica/decodifica a config inteira pra poder viajar dentro da própria
// URL do overlay. Isso existe porque o painel (aberto no seu navegador normal)
// e cada Browser Source do OBS rodam motores separados, cada um com seu
// próprio localStorage — mudar uma config no painel NÃO chega sozinha no
// overlay que já está rodando dentro do OBS. Ao colar um link novo (copiado
// depois de salvar) com "&cfg=...", o overlay lê essa config embutida e
// sobrescreve a própria cópia local automaticamente, no próximo carregamento.
function codificarConfigParaLink(cfg) {
  try {
    return btoa(unescape(encodeURIComponent(JSON.stringify(cfg))));
  } catch (e) {
    return "";
  }
}
function decodificarConfigDaLink(str) {
  return JSON.parse(decodeURIComponent(escape(atob(str))));
}

function carregarFonteGoogle(fonteKey) {
  const f = FONTES[fonteKey] || FONTES.padrao;
  if (f.googleFamily) {
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = "https://fonts.googleapis.com/css2?family=" + f.googleFamily + "&display=swap";
    document.head.appendChild(link);
  }
  return f.css;
}

// calcula o valor (diamantes x repetições) de um evento de presente,
// respeitando presentes "de sequência" (giftType 1, tipo Rosa): esses
// disparam um evento a cada repetição da combo, então só contamos de
// verdade quando repeatEnd:true chega (senão o mesmo presente é
// somado várias vezes enquanto o espectador segura o combo).
// devolve null quando o evento deve ser ignorado (combo em andamento).
function extrairValorPresente(data) {
  const giftType = data.giftDetails?.giftType ?? data.giftType;
  const repeatEnd = data.repeatEnd;
  const contavel = giftType !== 1 || repeatEnd === true || repeatEnd === undefined;
  if (!contavel) return null;
  const diamantes = data.diamondCount ?? data.giftDetails?.diamondCount ?? data.diamonds ?? data.value ?? 0;
  const repeticoes = data.repeatCount ?? data.combo ?? 1;
  return diamantes * repeticoes;
}

// converte "#1D9E75" em "29, 158, 117" pra usar em rgba(...)
function hexParaRgb(hex) {
  const limpo = String(hex).replace("#", "");
  const cheio = limpo.length === 3 ? limpo.split("").map(c => c + c).join("") : limpo;
  const n = parseInt(cheio, 16);
  if (isNaN(n)) return "255, 255, 255";
  return `${(n >> 16) & 255}, ${(n >> 8) & 255}, ${n & 255}`;
}

// anima um número de "de" até "para" dentro do texto de um elemento
function animarNumero(el, de, para, duracaoMs) {
  duracaoMs = duracaoMs || 500;
  if (!el || de === para) { if (el) el.textContent = para; return; }
  const inicio = performance.now();
  function passo(agora) {
    const progresso = Math.min(1, (agora - inicio) / duracaoMs);
    const facilitado = 1 - Math.pow(1 - progresso, 3);
    el.textContent = Math.round(de + (para - de) * facilitado);
    if (progresso < 1) requestAnimationFrame(passo);
    else el.textContent = para;
  }
  requestAnimationFrame(passo);
}

/* ============================================================
   SONS (sintetizados via Web Audio API — sem arquivo externo)
   ============================================================ */
let audioCtxCompartilhado = null;
function obterAudioCtx() {
  const AC = window.AudioContext || window.webkitAudioContext;
  if (!AC) return null;
  if (!audioCtxCompartilhado) audioCtxCompartilhado = new AC();
  if (audioCtxCompartilhado.state === "suspended") audioCtxCompartilhado.resume();
  return audioCtxCompartilhado;
}

// toca uma nota simples: freq em Hz, duração/atraso em ms
function tocarTom(freq, duracaoMs, atrasoMs, tipoOnda, volume) {
  const ctx = obterAudioCtx();
  if (!ctx) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = tipoOnda || "sine";
  osc.frequency.value = freq;
  const inicio = ctx.currentTime + (atrasoMs || 0) / 1000;
  const fim = inicio + duracaoMs / 1000;
  gain.gain.setValueAtTime(0.0001, inicio);
  gain.gain.linearRampToValueAtTime(Math.max(0.0001, volume), inicio + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, fim);
  osc.connect(gain).connect(ctx.destination);
  osc.start(inicio);
  osc.stop(fim + 0.03);
}

// Registro de sons ativos (Fase 4): qualquer som que começa a tocar
// (embutido, link personalizado ou de uma ação) se registra aqui, e o
// passo "Parar som" de uma regra usa isso pra silenciar tudo que
// estiver tocando naquele instante — inclusive loops.
// ------------------------------------------------------------
function registrarSomAtivo(pararFn) {
  if (typeof window === "undefined") return;
  window.__registroSons = window.__registroSons || [];
  window.__registroSons.push(pararFn);
  if (window.__registroSons.length > 200) window.__registroSons.shift(); // nunca deixa crescer sem fim
}
function pararTodosOsSons() {
  if (typeof window === "undefined" || !window.__registroSons) return;
  window.__registroSons.forEach(fn => { try { fn(); } catch (e) {} });
  window.__registroSons = [];
}

// toca um mp3/áudio de uma URL externa (ex: link copiado do myinstants) —
// devolve uma função pra parar na hora (usada pelo registro de sons ativos)
function tocarSomDeUrl(url, volume0a100) {
  if (!url) return () => {};
  try {
    const audio = new Audio(url);
    audio.volume = Math.min(1, Math.max(0, (volume0a100 ?? 70) / 100));
    audio.play().catch(e => console.warn("[som] não consegui tocar o link (o site pode bloquear uso externo):", e));
    return () => { try { audio.pause(); } catch (e) {} };
  } catch (e) { console.warn("[som] falhou:", e); return () => {}; }
}

// Compara dois valores ignorando a ordem das chaves dos objetos — o
// Firebase Realtime Database não preserva a ordem original (e pode até
// omitir objetos/arrays vazios), então comparar JSON.stringify puro dava
// falso positivo de "mudou" e recarregava sem necessidade.
function jsonEstavel(valor) {
  return JSON.stringify(valor, (chave, v) => {
    if (v && typeof v === "object" && !Array.isArray(v)) {
      return Object.keys(v).sort().reduce((acc, k) => { acc[k] = v[k]; return acc; }, {});
    }
    return v;
  });
}

// Escuta a nuvem SÓ nos overlays de verdade (não no painel — o painel já
// atualiza a própria tela sozinho quando salva, não precisa recarregar).
// Se a config de lá for diferente da que está salva aqui, atualiza e
// recarrega sozinho — é isso que faz a aparência mudar no overlay ao vivo
// sem copiar link. (Não roda em modo prévia, pra não recarregar o
// mini-preview sozinho.)
if (dbRefConfig && !modoPreview && view) {
  dbRefConfig.on("value", snap => {
    const remoto = snap.val();
    const localAtual = localStorage.getItem("configGeral");
    if (remoto) {
      const remotoEstavel = jsonEstavel(remoto);
      const localEstavel = localAtual ? jsonEstavel(JSON.parse(localAtual)) : null;
      if (localEstavel !== remotoEstavel) {
        localStorage.setItem("configGeral", JSON.stringify(remoto));
        location.reload();
      }
    } else if (localAtual) {
      // nuvem ainda vazia (primeira vez usando o sync): manda o que já
      // existe aqui pra servir de ponto de partida.
      dbRefConfig.set(JSON.parse(localAtual)).catch(() => {});
    }

}

// MOTOR DE CONDIÇÕES (Fase 2 — "Regras"): cada regra tem no máximo UMA
// condição (regra.condicao = {campo, operador, valor}), comparando um
// "campo" (do evento ou de uma variável global) com um valor. Campo
// vazio = sem condição, a regra dispara sempre que o gatilho acontecer.
// Fica definido ANTES do painel (que roda logo abaixo, no "if (!view)")
// porque a lista de regras já existentes é lida nele — se ficasse mais
// pra baixo no arquivo, ia dar erro de "usado antes de existir".
// ------------------------------------------------------------
const CAMPOS_CONDICAO = {
  valor:        { nome: "Valor do evento (likes/diamantes/etc.)", tipo: "numero", gatilhos: ["mensagem", "like", "presente", "seguidor", "compartilhamento"] },
  nickname:     { nome: "Nome do espectador", tipo: "texto", gatilhos: ["mensagem", "like", "presente", "seguidor", "compartilhamento"] },
  comentario:   { nome: "Texto da mensagem", tipo: "texto", gatilhos: ["mensagem"] },
  nomePresente: { nome: "Nome do presente", tipo: "texto", gatilhos: ["presente"] },
};
function camposDisponiveisParaGatilho(gatilho) {
  return Object.entries(CAMPOS_CONDICAO).filter(([, meta]) => meta.gatilhos.includes(gatilho)).map(([id, meta]) => ({ id, nome: meta.nome }));
}
const OPERADORES_POR_TIPO = {
  numero: [
    { id: "igual", nome: "é igual a" }, { id: "diferente", nome: "é diferente de" },
    { id: "maior", nome: "é maior que" }, { id: "maiorIgual", nome: "é maior ou igual a" },
    { id: "menor", nome: "é menor que" }, { id: "menorIgual", nome: "é menor ou igual a" },
  ],
  texto: [
    { id: "igual", nome: "é igual a" }, { id: "diferente", nome: "é diferente de" },
    { id: "contem", nome: "contém" }, { id: "naoContem", nome: "não contém" },
    { id: "comecaCom", nome: "começa com" }, { id: "terminaCom", nome: "termina com" },
  ],
};
// tipo efetivo de um campo (leva em conta variáveis globais, que podem
// ser número ou texto conforme a pessoa configurou)
function tipoDoCampo(campo, cfg) {
  if (campo && campo.indexOf("variavel:") === 0) {
    const v = (cfg.automacoes.variaveis || []).find(v => v.id === campo.slice(9));
    return (v && v.tipo) || "numero";
  }
  return (CAMPOS_CONDICAO[campo] && CAMPOS_CONDICAO[campo].tipo) || "texto";
}
function valorDoCampo(campo, ctx) {
  if (campo === "valor") return ctx.valor;
  if (campo === "nickname") return ctx.nickname || "";
  if (campo === "comentario") return ctx.data.comment || "";
  if (campo === "nomePresente") return ctx.data.giftDetails?.giftName ?? ctx.data.giftName ?? "";
  if (campo && campo.indexOf("variavel:") === 0) return lerValorVariavel(campo.slice(9), ctx.cfg);
  return "";
}
function compararOperador(operador, valorCampo, valorComparado, tipo) {
  if (tipo === "numero") {
    const a = Number(valorCampo) || 0, b = Number(valorComparado) || 0;
    if (operador === "igual") return a === b;
    if (operador === "diferente") return a !== b;
    if (operador === "maior") return a > b;
    if (operador === "maiorIgual") return a >= b;
    if (operador === "menor") return a < b;
    if (operador === "menorIgual") return a <= b;
    return false;
  }
  const a = String(valorCampo ?? "").toLowerCase(), b = String(valorComparado ?? "").toLowerCase();
  if (operador === "igual") return a === b;
  if (operador === "diferente") return a !== b;
  if (operador === "contem") return a.includes(b);
  if (operador === "naoContem") return !a.includes(b);
  if (operador === "comecaCom") return a.startsWith(b);
  if (operador === "terminaCom") return a.endsWith(b);
  return false;
}
function avaliarCondicao(cond, ctx) {
  const tipo = tipoDoCampo(cond.campo, ctx.cfg);
  return compararOperador(cond.operador, valorDoCampo(cond.campo, ctx), cond.valor, tipo);
}
function avaliarRegra(regra, ctx) {
  if (regra.gatilho !== ctx.gatilho) return false;
  // formato atual: condição única
  if (regra.condicao) {
    if (!regra.condicao.campo) return true; // sem condição = sempre dispara
    return avaliarCondicao(regra.condicao, ctx);
  }
  // regra salva antes dessa versão (ainda não passou pelo painel pra
  // migrar): interpreta os formatos antigos direto, em vez de tratar
  // como "sem condição" — senão toda regra antiga passaria a disparar
  // sempre até a pessoa reabrir e salvar o painel de novo.
  if (regra.condicionamento) {
    const grupo = regra.condicionamento.grupos && regra.condicionamento.grupos[0];
    const cond = grupo && grupo.condicoes && grupo.condicoes[0];
    return cond ? avaliarCondicao(cond, ctx) : true;
  }
  if (regra.condicaoTipo === "valorMinimo") return (ctx.valor || 0) >= Number(regra.condicaoValor || 0);
  if (regra.condicaoTipo === "contemPalavra") return String(ctx.data.comment || "").toLowerCase().includes(String(regra.condicaoValor || "").toLowerCase());
  return true; // "sempre" ou regra sem condição antiga nenhuma
}

// ------------------------------------------------------------
// VARIÁVEIS GLOBAIS: contadores/valores que as regras podem ler (como
// campo de condição, "variavel:<id>") e escrever (efeitos, quando a
// regra dispara). Ficam salvas separado da config (localStorage, com a
// mesma chave isolada de preview/teste que ranking e prêmios usam) pra
// não precisar salvar a config inteira a cada incremento.
// ------------------------------------------------------------
function chaveVariaveisRuntime() { return chaveEspectadores("variaveisRuntime"); }
function lerVariaveisRuntime() {
  try { return JSON.parse(localStorage.getItem(chaveVariaveisRuntime())) || {}; } catch (e) { return {}; }
}
function salvarVariaveisRuntime(obj) {
  try { localStorage.setItem(chaveVariaveisRuntime(), JSON.stringify(obj)); } catch (e) {}
}
function lerValorVariavel(variavelId, cfg) {
  const runtime = lerVariaveisRuntime();
  if (runtime[variavelId] !== undefined) return runtime[variavelId];
  const def = (cfg.automacoes.variaveis || []).find(v => v.id === variavelId);
  return def ? def.valorInicial : 0;
}
// aplica UM efeito num objeto runtime já carregado (usado tanto pelos
// "efeitos" da regra quanto pelo passo "variavel" da sequência — mesma
// lógica, só muda quem carrega/salva o runtime em volta)
function aplicarUmEfeitoVariavel(ef, ctx, runtime) {
  const def = (ctx.cfg.automacoes.variaveis || []).find(v => v.id === ef.variavelId);
  if (!def) return;
  const atual = runtime[ef.variavelId] !== undefined ? runtime[ef.variavelId] : def.valorInicial;
  let novo = atual;
  if (def.tipo === "numero") {
    const n = Number(atual) || 0;
    if (ef.operacao === "incrementar") novo = n + (Number(ef.valor) || 1);
    else if (ef.operacao === "decrementar") novo = n - (Number(ef.valor) || 1);
    else if (ef.operacao === "definir") novo = Number(ef.valor) || 0;
    else if (ef.operacao === "somarValorEvento") novo = n + (ctx.valor || 0);
  } else if (ef.operacao === "definir") {
    novo = ef.valor;
  }
  runtime[ef.variavelId] = novo;
}
function aplicarEfeitosVariaveis(regra, ctx) {
  if (!regra.efeitos || !regra.efeitos.length) return;
  const runtime = lerVariaveisRuntime();
  regra.efeitos.forEach(ef => aplicarUmEfeitoVariavel(ef, ctx, runtime));
  salvarVariaveisRuntime(runtime);
}
// resolve {nickname}, {valor} e {var:nome} (nome da variável, não o id)
function textoComPlaceholders(texto, nickname, valor, cfg) {
  let out = (texto || "").replace(/\{nickname\}/g, nickname).replace(/\{valor\}/g, valor);
  if (cfg && cfg.automacoes.variaveis && cfg.automacoes.variaveis.length) {
    out = out.replace(/\{var:([^}]+)\}/g, (m, nome) => {
      const v = cfg.automacoes.variaveis.find(v => v.nome === nome.trim());
      return v ? String(lerValorVariavel(v.id, cfg)) : m;
    });
  }
  return out;
}

      return;
    }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: "pt", format: "a4" });
    const margem = 48;
    const larguraUtil = doc.internal.pageSize.getWidth() - margem * 2;
    const alturaPagina = doc.internal.pageSize.getHeight();
    let y = margem;

    function novaLinhaSeNecessario(altura) {
      if (y + altura > alturaPagina - margem) { doc.addPage(); y = margem; }
    }

    doc.setFont("helvetica", "bold");
    doc.setFontSize(17);
    novaLinhaSeNecessario(26);
    doc.text(manual.titulo, margem, y);
    y += 22;

    doc.setFont("helvetica", "normal");
    doc.setFontSize(11);
    doc.setTextColor(90);
    const linhasResumo = doc.splitTextToSize(manual.resumo, larguraUtil);
    linhasResumo.forEach(linha => { novaLinhaSeNecessario(15); doc.text(linha, margem, y); y += 15; });
    y += 10;

        doc.setFontSize(13);

  function caixaPreviaIframe(viewId) {
    return `<div style="position:relative;width:100%;max-width:${PREVIA_BOX_W}px;aspect-ratio:16/9;overflow:hidden;border-radius:8px;background:repeating-conic-gradient(var(--bg-alt) 0% 25%, var(--bg) 0% 50%) 0 0/16px 16px;">
      <iframe id="previaFrame_${viewId}" style="position:absolute;top:0;left:0;width:1920px;height:1080px;border:0;background:transparent;transform-origin:top left;pointer-events:none;"></iframe>
    </div>`;

  // Aproxima a prévia na região onde o overlay realmente aparece (em vez de
  // mostrar o quadro 1920x1080 inteiro reduzido, o que deixava o card
  // minúsculo num canto). PREVIA_BOX_W/H precisam bater com o tamanho da
  // caixa acima (max-width e aspect-ratio 16:9).
  const PREVIA_BOX_W = 720, PREVIA_BOX_H = 405;
  function calcularTransformPrevia(overlayId, cfgFresco) {
    function crop(escala, foco) {
      const w = PREVIA_BOX_W / escala, h = PREVIA_BOX_H / escala;
      let x0 = 0, y0 = 0;
      if (foco === "topright") { x0 = 1920 - w; y0 = 0; }
      else if (foco === "bottomcenter") { x0 = 960 - w / 2; y0 = 1080 - h; }
      else if (foco === "center") { x0 = 960 - w / 2; y0 = 540 - h / 2; }
      return { escala, tx: -x0, ty: -y0 };
    }
    if (overlayId === "metas") {
      const layout = (cfgFresco.metas && cfgFresco.metas.layout) || "lateral";
      if (layout === "barra") return crop(0.85, "bottomcenter");
      if (layout === "popup") return crop(0.55, "center");
      return crop(0.95, "topleft");
    }
    if (overlayId === "vitrine") return crop(2.2, "bottomcenter");
    if (overlayId === "eventos") return crop(0.95, "topright");
    return crop(0.95, "topleft"); // ranking, alerta, combo — aparecem sem position fixa, no canto superior esquerdo

    document.getElementById("templateDoZero").addEventListener("click", () => criarECfgAbrirEditor({}));
  });

  // ------------------------------------------------------------
  // Modal de edição completa de uma ação: geral, texto, ícone, som,
  // animação, fundo e barra de progresso — com prévia ao vivo que
  // atualiza a cada mudança de campo, igual pedido (Fase 1).
  // ------------------------------------------------------------
  const estiloCampoAE = "width:100%;box-sizing:border-box;background:var(--bg-alt);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:9px;font-size:13px;";

  function campoSelectAE(id, label, opcoes, valorAtual) {
    return `<div><label style="${rotuloAE}">${label}</label>
      <select id="${id}" style="${estiloCampoAE}">
        ${opcoes.map(o => `<option value="${o.id}" ${o.id === valorAtual ? "selected" : ""}>${o.nome}</option>`).join("")}
      </select></div>`;
  }
  function fecharModalAcao() {
    const el = document.getElementById("modalEditarAcao");
    if (el) el.remove();
  }

  function abrirModalEditarAcao(index) {
    fecharModalAcao();

    if (!a) return;

    const backdrop = document.createElement("div");
    backdrop.id = "modalEditarAcao";
    backdrop.className = "topbar-modal-backdrop";
    backdrop.innerHTML = `
      <div class="topbar-modal" style="max-width:640px;max-height:88vh;overflow-y:auto;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
          <div style="font-size:16px;font-weight:700;">Editar ação — ${a.nome}</div>
          <button id="aeFechar" style="background:transparent;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;line-height:1;">×</button>
        </div>

        <div id="aePreviaBox" style="max-width:400px;margin:0 auto 20px;"></div>

        <div style="font-size:13px;font-weight:600;margin-bottom:10px;">Geral</div>
        <div style="display:grid;grid-template-columns:2fr 1fr;gap:10px;margin-bottom:10px;">
          ${campoTexto("aeNome", "Nome da ação", a.nome)}
