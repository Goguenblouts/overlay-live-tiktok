function copiarTexto(texto) {
  const temp = document.createElement("textarea");
  temp.value = texto;
  temp.style.position = "fixed";
  temp.style.opacity = "0";
  document.body.appendChild(temp);
  temp.select();
  try { document.execCommand("copy"); } catch (e) {}
  document.body.removeChild(temp);
}

/* ============================================================
   SIMULADOR DE EVENTOS (modo de teste, sem precisar de live)
   - ativado com ?sim=1 no final do link do overlay
   - gera eventos falsos (chat, like, presente, seguidor,
   compartilhar) em intervalos aleatórios, então dá pra testar
   qualquer overlay no OBS/TikTok Studio com a live apagada e o
   TikFinity fechado.
   ============================================================ */
function gerarEventoFake() {
  // Só 4 nomes (não 8) pra concentrar os pontos em menos gente — assim os
  // tiers de prêmio (Config de "Prêmios da live") batem bem mais rápido
  // durante o teste. O likeCount também sobe (50-400 em vez de 1-30) pra
  // ultrapassar o "a cada X likes" com mais frequência.
  const nicks = ["ana_lives", "joao22", "gamer_br", "luiza.ttk"];
  const sorteio = Math.random() * 100;
  const nickname = nicks[Math.floor(Math.random() * nicks.length)];
  const userId = "teste_" + nickname;
  if (sorteio < 38) {
    return { event: "chat", data: { userId, nickname, comment: "mensagem de teste" } };
  } else if (sorteio < 68) {
    return { event: "like", data: { userId, nickname, likeCount: Math.floor(Math.random() * 350) + 50 } };
  } else if (sorteio < 88) {
    const opcoesDiamantes = [1, 1, 5, 5, 10, 10, 20, 50, 100, 500, 1000];
    const diamantes = opcoesDiamantes[Math.floor(Math.random() * opcoesDiamantes.length)];
    return { event: "gift", data: { userId, nickname, diamondCount: diamantes, repeatCount: 1 } };
  } else if (sorteio < 96) {
    return { event: "follow", data: { userId, nickname, followRole: 1 } };
  } else {
    return { event: "share", data: { userId, nickname } };
  }
}

// ------------------------------------------------------------
// SIMULADOR DO PAINEL (Fase 3): permite ao painel mandar UM evento
// específico e controlado (montado no formulário da aba Simulador),
// diferente do gerador aleatório acima. O overlay escuta via
// postMessage — funciona junto com ?sim=1 e com o TikFinity de
// verdade, sem conflito, porque só reage às mensagens que recebe.
// ------------------------------------------------------------
function escutarSimuladorDoPainel(processarFn) {
  window.addEventListener("message", (e) => {
    if (!e.data || e.data.tipo !== "eventoSimuladoPainel") return;
    window.__silenciarSom = !!e.data.silencioso;
    try {
      processarFn(e.data.payload);
    } finally {
      window.__silenciarSom = false;
    }
  });
}

function iniciarSimulador(processarEvento, opcoes) {
  const min = (opcoes && opcoes.min) || 1200;
  const max = (opcoes && opcoes.max) || 3000;
  console.log("[modo teste] gerando eventos falsos automaticamente — sem live e sem TikFinity");
  processarEvento(gerarEventoFake());
  setInterval(() => processarEvento(gerarEventoFake()), min + Math.random() * (max - min));
}

// conecta no TikFinity e repassa cada evento recebido pra função aoReceber
function conectarTikFinity(cfg, tag, aoReceber) {
  function conectar() {
    const ws = new WebSocket(cfg.tikfinityWsUrl);
    ws.onopen = () => console.log(`[${tag}] conectado ao TikFinity`);
    ws.onmessage = (msg) => {
      let payload;
      try { payload = JSON.parse(msg.data); } catch (e) { return; }
      aoReceber(payload);
    };
    ws.onclose = () => setTimeout(conectar, 3000);
    ws.onerror = () => ws.close();
  }
  conectar();
}

/* ============================================================
   OVERLAY: METAS — prêmios por espectador
   Cada espectador acumula pontos por conta própria (chat, likes,
   presentes, seguir, compartilhar). Quando OS PONTOS DELE batem um
   tier, ele desbloqueia aquele prêmio e aparece um card aqui
   avisando. Isso nunca zera sozinho — fica salvo pra sempre no
   localStorage até o streamer resetar manualmente pelo painel
   (Config > Zona de risco).
   ============================================================ */
function dispararConfeteCanvas(container, cor) {
  if (typeof window.confetti !== "function") return;
  try {
    const rect = container.getBoundingClientRect();
    const origin = {
      x: (rect.left + rect.width / 2) / window.innerWidth,
      y: (rect.top + rect.height / 2) / window.innerHeight,
    };
    window.confetti({ particleCount: 60, spread: 65, startVelocity: 32, origin, colors: [cor, "#ffffff"], disableForReducedMotion: true });
  } catch (e) { /* biblioteca indisponível (ex: sem internet) — segue só com o efeito local */ }
}

function dispararConfete(container, cor) {
  dispararConfeteCanvas(container, cor);
  const camada = document.createElement("div");
  camada.style.cssText = "position:absolute;left:50%;top:40%;width:0;height:0;pointer-events:none;";
  for (let i = 0; i < 12; i++) {
    const p = document.createElement("span");
    const ang = Math.random() * Math.PI * 2;
    const dist = 26 + Math.random() * 34;
    const tx = Math.cos(ang) * dist;
    const ty = Math.sin(ang) * dist;
    p.style.cssText = `position:absolute;left:0;top:0;width:6px;height:6px;border-radius:2px;background:${Math.random() > 0.5 ? cor : "#fff"};--tx:${tx}px;--ty:${ty}px;--rot:${Math.round(Math.random() * 360)}deg;animation:confetePop 0.7s ease-out forwards;`;
    camada.appendChild(p);
  }
  container.appendChild(camada);
  setTimeout(() => camada.remove(), 750);
}

// ------------------------------------------------------------
// Efeitos de tela cheia (Fase 4 — "ações executáveis" de uma regra):
// confete/fogos não dependem de um card específico, então disparam
// direto na tela toda, reaproveitando o canvas-confetti já carregado.
// ------------------------------------------------------------
function efeitoConfeteTela(cor) {
  if (typeof window.confetti !== "function") return;
  try {
    window.confetti({ particleCount: 90, spread: 80, startVelocity: 38, origin: { x: 0.5, y: 0.4 }, colors: [cor || "#F0A63C", "#ffffff"], disableForReducedMotion: true });
  } catch (e) {}
}
function efeitoFogosTela(cor) {
  if (typeof window.confetti !== "function") return;
  const cores = [cor || "#F0464B", "#F0C24B", "#22D3EE", "#7F77DD"];
  [0, 300, 600].forEach((atraso, i) => {
    setTimeout(() => {
      try {
        window.confetti({
          particleCount: 55, spread: 360, startVelocity: 45, gravity: 0.6, ticks: 90, scalar: 1.05,
          origin: { x: 0.2 + Math.random() * 0.6, y: 0.25 + Math.random() * 0.25 },
          colors: [cores[i % cores.length], "#ffffff"], disableForReducedMotion: true,
        });
      } catch (e) {}
    }, atraso);
  });
}

function carregarPremios() {
  try { return JSON.parse(localStorage.getItem(chaveEspectadores("premiosPorUsuario")) || "{}"); }
  catch (e) { return {}; }
}
function salvarPremios(obj) {
  localStorage.setItem(chaveEspectadores("premiosPorUsuario"), JSON.stringify(obj));
}

// ------------------------------------------------------------
// Reset "da live": pontos de mensagem/like/seguidor/compartilhamento
// (e o ranking, que já se chama "Top seguidores da live") zeram
// automaticamente quando passa um tempo sem nenhum evento chegar
// (padrão 4h, ajustável em cfg.resetLive.horasParaAutoReset) — sinal de
// que a live anterior acabou e outra está começando. NÃO mexe em
// presenteMensal nem nos tiersGanhos de escopo "mensal": presente é
// dinheiro de verdade, não pode sumir entre uma live e outra.
// ------------------------------------------------------------
function chaveUltimaAtividadeLive() { return chaveEspectadores("ultimaAtividadeLive"); }

function resetarBucketDaLive() {
  const cfgAtual = carregarConfig();
  const premiosAtual = carregarPremios();
  const idsLive = new Set((cfgAtual.tiers || []).filter(t => t.escopo !== "mensal").map(t => t.id));
  Object.values(premiosAtual).forEach(u => {
    if (u.fontes) Object.keys(u.fontes).forEach(f => { u.fontes[f] = 0; });
    u.tiersGanhos = (u.tiersGanhos || []).filter(id => !idsLive.has(id));
  });
  salvarPremios(premiosAtual);
  localStorage.removeItem(chaveEspectadores("rankingUsuarios"));
}

// chamar sempre que um evento chegar (e uma vez ao carregar o overlay).
// Retorna true se acabou de resetar por ter ficado tempo parado demais —
// quem chamar deve recarregar a própria página pra ressincronizar o
// estado em memória com o que acabou de ser zerado no localStorage.
function checarResetAutomaticoLive(cfg) {
  const horas = (cfg.resetLive && cfg.resetLive.horasParaAutoReset) || 4;
  const limiteMs = horas * 60 * 60 * 1000;
  const agora = Date.now();
  const ultima = Number(localStorage.getItem(chaveUltimaAtividadeLive()) || 0);
  let resetou = false;
  if (ultima && (agora - ultima) > limiteMs) {
    resetarBucketDaLive();
    resetou = true;
  }
  localStorage.setItem(chaveUltimaAtividadeLive(), String(agora));
  return resetou;
}

// ------------------------------------------------------------
// Reset "do mês": presenteMensal (e os tiersGanhos de escopo "mensal")
// zeram sozinhos quando o mês do calendário muda — cada overlay detecta
// isso comparando com o próprio relógio, sem precisar de sinal do
// Firebase (o mês vira igual em qualquer lugar do mundo no mesmo dia).
// ------------------------------------------------------------
function chaveMesReferencia() { return chaveEspectadores("mesReferenciaMensal"); }

function checarResetAutomaticoMensal() {
  const mesAtual = new Date().toISOString().slice(0, 7); // "2026-07"
  const mesSalvo = localStorage.getItem(chaveMesReferencia());
  let resetou = false;
  if (mesSalvo && mesSalvo !== mesAtual) {
    const cfgAtual = carregarConfig();
    const premiosAtual = carregarPremios();
    const idsMensal = new Set((cfgAtual.tiers || []).filter(t => t.escopo === "mensal").map(t => t.id));
    Object.values(premiosAtual).forEach(u => {
      u.presenteMensal = 0;
      u.tiersGanhos = (u.tiersGanhos || []).filter(id => !idsMensal.has(id));
    });
    salvarPremios(premiosAtual);
    resetou = true;
  }
  localStorage.setItem(chaveMesReferencia(), mesAtual);
  return resetou;
}

function renderMetas() {
  const cfg = carregarConfig();
  const t = temaEfetivo(cfg, "metas");
  const fonteCss = carregarFonteGoogle(t.fonte);
  document.body.style.fontFamily = fonteCss;

  // roda os dois antes de ler os prêmios do localStorage, pra já
  // carregar os dados frescos (zerados, se for o caso) daqui pra baixo.
  checarResetAutomaticoLive(cfg);
  checarResetAutomaticoMensal();

  const fontesPossiveis = ["mensagem", "like", "seguidor", "compartilhamento"];
  const premios = carregarPremios(); // { [userId]: { nickname, fontes:{...}, presenteMensal, tiersGanhos:[] } }

  const LAYOUTS_METAS = {
    lateral: { css: "position:fixed;top:24px;left:24px;max-width:380px;display:flex;flex-direction:column;gap:10px;", escala: 1 },
    barra:   { css: "position:fixed;bottom:0;left:0;width:100%;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;padding:22px 0;", escala: 1.1 },
    popup:   { css: "position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;", escala: 1.5 },
  };
  const layoutEscolhido = LAYOUTS_METAS[cfg.metas && cfg.metas.layout] || LAYOUTS_METAS.lateral;

  const root = document.createElement("div");
  root.style.cssText = layoutEscolhido.css;
  document.body.appendChild(root);
  const api = criarFilaDeCards(root, layoutEscolhido.escala);

  function obterUsuario(userId, nickname) {
    if (!premios[userId]) {
      premios[userId] = { nickname, fontes: Object.fromEntries(fontesPossiveis.map(f => [f, 0])), presenteMensal: 0, tiersGanhos: [] };
    }
    const u = premios[userId];
    // migração: quem já tinha pontos de presente acumulados no modelo
    // antigo (uma fonte só, nunca resetava) não pode perder isso — migra
    // pra presenteMensal uma vez só, na primeira vez que essa versão rodar.
    if (u.fontes && typeof u.fontes.presente === "number") {
      u.presenteMensal = (u.presenteMensal || 0) + u.fontes.presente;
      delete u.fontes.presente;
    }
    if (typeof u.presenteMensal !== "number") u.presenteMensal = 0;
    if (nickname) u.nickname = nickname;
    return u;
  }

  function checarTiers(userId) {
    const u = premios[userId];
    cfg.tiers.forEach((tier, index) => {
      if (u.tiersGanhos.includes(tier.id)) return;
      const soma = tier.escopo === "mensal"
        ? (u.presenteMensal || 0)
        : (tier.fontes || []).reduce((s, f) => s + (u.fontes[f] || 0), 0);
      if (soma >= tier.pontos) {
        u.tiersGanhos.push(tier.id);
        const raridade = raridadeDoTier(index, cfg.tiers.length);
        api.mostrar({
          icone: iconeTierHtml(tier, 22),
          titulo: "prêmio desbloqueado",
          subtitulo: `${u.nickname} ganhou <span style="color:${raridade.cor};">${tier.nome}</span>`,
          destaque: true,
          tema: t,
          corDestaque: raridade.cor,
          raridade: raridade.nome,
          duracaoMs: 5500,
          animacoesAtivas: cfg.animacoes,
        });
        tocarSomConfig(cfg.sons.premio, cfg.sons.volume);
      }
    });
  }

  function processarEventoMetas(payload) {
    console.log("[overlay-metas] evento:", payload);
    if (checarResetAutomaticoLive(cfg) || checarResetAutomaticoMensal()) { location.reload(); return; }
    const tipo = payload.event;
    const data = payload.data || {};
    const v = cfg.valores;
    const userId = data.userId ?? data.uniqueId ?? data.user?.userId ?? data.user?.uniqueId;
    const nickname = data.nickname ?? data.user?.nickname ?? data.uniqueId ?? "espectador";
    if (!userId) return;
    const u = obterUsuario(userId, nickname);

    if (tipo === "gift") {
      const valorBase = extrairValorPresente(data);
      if (valorBase !== null) u.presenteMensal += valorBase * v.presente;
    }
    if (tipo === "chat" || tipo === "comment") u.fontes.mensagem += v.mensagem;
    if (tipo === "like") {
      const qtd = data.likeCount ?? data.count ?? 1;
      u.fontes.like += Math.floor(qtd / v.likeACada) * v.likeValor;
    }
    if (tipo === "follow" || tipo === "member") u.fontes.seguidor += v.seguidor;
    if (tipo === "share") u.fontes.compartilhamento += v.compartilhamento;

    salvarPremios(premios);
    checarTiers(userId);
  }

  escutarSimuladorDoPainel(processarEventoMetas);
  if (params.get("sim") === "1") {
    iniciarSimulador(processarEventoMetas);
  } else {
    conectarTikFinity(cfg, "overlay-metas", processarEventoMetas);
  }
}

/* ============================================================
   OVERLAY: RANKING
   ============================================================ */
function renderRanking() {
  const cfg = carregarConfig();
  const t = temaEfetivo(cfg, "ranking");
  const fonteCss = carregarFonteGoogle(t.fonte);
  document.body.style.fontFamily = fonteCss;

  // "Top seguidores da live" já é por definição um ranking da live atual
  // — reseta junto com o resto do balde "da live" (ver checarResetAutomaticoLive
  // mais acima no arquivo, definido perto de carregarPremios/salvarPremios).
  checarResetAutomaticoLive(cfg);
  checarResetAutomaticoMensal();

  let ranking = JSON.parse(localStorage.getItem(chaveEspectadores("rankingUsuarios")) || "{}");
  let seguidoresConhecidos = JSON.parse(localStorage.getItem(chaveEspectadores("seguidoresConhecidos")) || "{}");
  function salvarRanking() { localStorage.setItem(chaveEspectadores("rankingUsuarios"), JSON.stringify(ranking)); }
  function salvarSeguidores() { localStorage.setItem(chaveEspectadores("seguidoresConhecidos"), JSON.stringify(seguidoresConhecidos)); }

  function ehSeguidor(userId, data) {
    if (typeof data.followRole === "number") {
      if (data.followRole >= 1) { seguidoresConhecidos[userId] = true; salvarSeguidores(); }
      return data.followRole >= 1;
    }
    if (typeof data.isFollower === "boolean") {
      if (data.isFollower) { seguidoresConhecidos[userId] = true; salvarSeguidores(); }
      return data.isFollower;
    }
    return !!seguidoresConhecidos[userId];
  }
  function somar(userId, nickname, pontos) {
    if (!ranking[userId]) ranking[userId] = { nickname, pontos: 0 };
    ranking[userId].nickname = nickname || ranking[userId].nickname;
    ranking[userId].pontos += pontos;
    salvarRanking();
  }

  const root = document.createElement("div");
  root.style.cssText = `background:${t.corFundo};border-radius:${t.raio}px;padding:18px 22px;max-width:320px;font-family:${fonteCss};`;
  document.body.appendChild(root);
  root.innerHTML = `<div style="font-size:12px;color:${t.corTextoSec};margin-bottom:10px;text-transform:uppercase;letter-spacing:0.05em;">Top seguidores da live</div><div id="lista"></div>`;

  let ultimoTop = [];
  function render() {
    const premios = carregarPremios(); // só leitura, quem escreve é o overlay de metas
    const mapaAntigo = {};
    ultimoTop.forEach((u, i) => { mapaAntigo[u.id] = i; });
    const top = Object.entries(ranking)
      .map(([id, u]) => ({ id, nickname: u.nickname, pontos: u.pontos, premios: premios[id]?.tiersGanhos?.length || 0 }))
      .sort((a, b) => b.pontos - a.pontos)
      .slice(0, cfg.tamanhoRanking);
    document.getElementById("lista").innerHTML = gerarHtmlRanking(t, top, mapaAntigo, cfg.animacoes);
    ultimoTop = top;
  }
  render();

  function processarEventoRanking(payload) {
    console.log("[overlay-ranking] evento:", payload);
    if (checarResetAutomaticoLive(cfg) || checarResetAutomaticoMensal()) { location.reload(); return; }
    const tipo = payload.event;
    const data = payload.data || {};
    const v = cfg.valores;
    const userId = data.userId ?? data.uniqueId ?? data.user?.userId ?? data.user?.uniqueId;
    const nickname = data.nickname ?? data.user?.nickname ?? data.uniqueId ?? "espectador";
    if (!userId) return;
    if (tipo === "follow") {
      seguidoresConhecidos[userId] = true;
      salvarSeguidores();
      tocarSomConfig(cfg.sons.seguidor, cfg.sons.volume);
    }
    const conta = !cfg.exigirSeguidor || ehSeguidor(userId, data);
    if (!conta) return;
    if (tipo === "gift") {
      const valorBase = extrairValorPresente(data);
      if (valorBase !== null) somar(userId, nickname, valorBase * v.presente);
    }
    if (tipo === "chat" || tipo === "comment") somar(userId, nickname, v.mensagem);
    if (tipo === "like") {
      const qtd = data.likeCount ?? data.count ?? 1;
      const ganhos = Math.floor(qtd / v.likeACada) * v.likeValor;
      if (ganhos > 0) somar(userId, nickname, ganhos);
    }
    if (tipo === "follow" || tipo === "member") somar(userId, nickname, v.seguidor);
    if (tipo === "share") somar(userId, nickname, v.compartilhamento);
    render();
  }

  escutarSimuladorDoPainel(processarEventoRanking);
  if (params.get("sim") === "1") {
    iniciarSimulador(processarEventoRanking);
  } else {
    conectarTikFinity(cfg, "overlay-ranking", processarEventoRanking);
  }
}

// gerencia uma fila de cards genéricos dentro de "container" — usado
// pelo alerta de presente E pelo aviso de prêmio desbloqueado (e pela
// prévia do painel). cada item: {icone, titulo, subtitulo, destaque,
// tema, duracaoMs, animacoesAtivas}
const ANIMACOES_CARD = {
  slide: { in: "slideInTop 0.35s cubic-bezier(.22,1,.36,1) both", out: "slideOutTop 0.3s ease both" },
  fade:  { in: "fadeInCard 0.3s ease both", out: "fadeOutCard 0.3s ease both" },
  zoom:  { in: "zoomInCard 0.32s cubic-bezier(.22,1,.36,1) both", out: "zoomOutCard 0.25s ease both" },
  bounce:{ in: "bounceInCard 0.55s cubic-bezier(.22,1,.36,1) both", out: "bounceOutCard 0.25s ease both" },
};

function criarFilaDeCards(container, escala) {
  escala = escala || 1;
  const fila = [];
  let mostrando = false;

  function processarFila() {
    if (mostrando || fila.length === 0) return;
    mostrando = true;
    const { icone, titulo, subtitulo, destaque, tema, duracaoMs, animacoesAtivas, corDestaque, raridade } = fila.shift();
    const corBorda = corDestaque || tema.corPrimaria;
    const raioCard = Math.max(8, tema.raio) * escala;
    const fundoCard = raridade
      ? `${gradienteRaridade(corBorda)}, ${tema.corCard}`
      : tema.corCard;
    const anim = ANIMACOES_CARD[tema.animacaoEstilo] || ANIMACOES_CARD.slide;
    const cartao = document.createElement("div");
    cartao.className = raridade ? "card-raridade" : "";
    cartao.style.cssText = `position:relative;display:flex;align-items:center;gap:${12 * escala}px;padding:${14 * escala}px ${18 * escala}px;border-radius:${raioCard}px;background:${fundoCard};border:1.5px solid ${destaque ? corBorda : (raridade ? corBorda + "88" : tema.corBorda)};box-shadow:0 10px 30px rgba(0,0,0,.35)${destaque ? `, 0 0 0 1px ${corBorda}55, 0 0 24px ${corBorda}55` : ""};animation:${anim.in};`;
    cartao.innerHTML = `
      <div style="width:${38 * escala}px;height:${38 * escala}px;flex-shrink:0;border-radius:50%;background:${corBorda};display:flex;align-items:center;justify-content:center;font-size:${18 * escala}px;">${icone}</div>
      <div style="min-width:0;">
        <div style="font-size:${12 * escala}px;color:${tema.corTextoSec};">${titulo}${raridade ? ` · <span style="color:${corBorda};font-weight:600;">${raridade}</span>` : ""}</div>
        <div style="font-size:${15 * escala}px;color:${tema.corTexto};font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${subtitulo}</div>
      </div>
    `;
    container.appendChild(cartao);
    if (destaque && animacoesAtivas !== false) dispararConfete(cartao, corBorda);
    setTimeout(() => {
      cartao.style.animation = anim.out;
      setTimeout(() => {
        cartao.remove();
        mostrando = false;
        processarFila();
      }, 300);
    }, duracaoMs);
  }

  return {
    mostrar(opcoes) {
      fila.push(opcoes);
      processarFila();
    },
  };
}

/* ============================================================

  { id: "slideTop", nome: "Slide Top" }, { id: "slideBottom", nome: "Slide Bottom" }, { id: "zoom", nome: "Zoom" },

];

// Carrega a lib lottie-web sob demanda (só se alguma ação usar ícone
// Lottie) e inicia qualquer animação pendente na tela.
let _lottiePromise = null;
function garantirLottie() {
  if (typeof window.lottie !== "undefined") return Promise.resolve();
  if (_lottiePromise) return _lottiePromise;
  _lottiePromise = new Promise((resolve) => {
    const script = document.createElement("script");
    script.src = "https://cdn.jsdelivr.net/npm/lottie-web@5.12.2/build/player/lottie.min.js";
    script.onload = () => resolve();
    script.onerror = () => resolve(); // falha silenciosa (ex: sem internet) — ícone some, resto continua
    document.head.appendChild(script);
  });
  return _lottiePromise;
}
function iniciarLottiesPendentes(container) {
  const alvos = container.querySelectorAll(".lottie-acao[data-lottie-url]:not([data-lottie-ok])");
  if (!alvos.length) return;
  garantirLottie().then(() => {
    if (typeof window.lottie === "undefined") return;
    alvos.forEach(el => {
      el.setAttribute("data-lottie-ok", "1");
      try {
        window.lottie.loadAnimation({ container: el, renderer: "svg", loop: true, autoplay: true, path: el.dataset.lottieUrl });
      } catch (e) { /* json inválido ou inacessível — segue sem o ícone */ }
    });
  });
}

// Ícone de uma ação: emoji (texto puro), imagem/gif/svg (img), lottie
// (json animado) ou "auto" (comportamento antigo: classe FA ou emoji por
// palavra-chave no nome, via iconeTierHtml — mantém ações antigas iguais).
function iconeAcaoHtml(acao, tamanhoPx) {
  const tamanho = tamanhoPx || 20;
  const tipo = acao.iconeTipo || "auto";
  if ((tipo === "imagem" || tipo === "gif" || tipo === "svg") && acao.iconeUrl) {
    return `<img src="${acao.iconeUrl}" style="width:${tamanho}px;height:${tamanho}px;object-fit:cover;border-radius:50%;" onerror="this.style.opacity='0'"/>`;
  }
  if (tipo === "lottie" && acao.iconeUrl) {
    return `<div class="lottie-acao" data-lottie-url="${acao.iconeUrl}" style="width:${tamanho + 6}px;height:${tamanho + 6}px;"></div>`;
  }
  if (tipo === "emoji") {
    return `<span style="font-size:${tamanho}px;line-height:1;">${acao.icone || "⭐"}</span>`;
  }
  return iconeTierHtml({ icone: acao.icone, nome: acao.nome }, tamanho);
}

// Toca o som de uma ação com suporte a volume próprio, fade in/out e
// loop (só faz sentido pra som "personalizado", os tons embutidos são
// curtos demais pra fade/loop). Devolve uma função pra parar na hora
// (usada quando o card some antes do fim do som, ex: loop).
function tocarSomAcao(somCfg, volumeGeral, duracaoMs) {
  if (!somCfg || !somCfg.ativo) return () => {};
  if (typeof modoMudo !== "undefined" && modoMudo) return () => {};
  if (typeof window !== "undefined" && window.__silenciarSom) return () => {};
  const volBase = Math.min(1, Math.max(0, ((somCfg.volume ?? volumeGeral) ?? 70) / 100));
  if (somCfg.som !== "personalizado" || !somCfg.url) {
    tocarSom(somCfg.som, somCfg.volume ?? volumeGeral);
    return () => {};
  }
  try {
    const audio = new Audio(somCfg.url);
    audio.loop = !!somCfg.loop;
    const fadeInMs = somCfg.fadeInMs || 0;
    const fadeOutMs = somCfg.fadeOutMs || 0;
    audio.volume = fadeInMs > 0 ? 0 : volBase;
    audio.play().catch(e => console.warn("[som] não consegui tocar o link:", e));
    let timerFadeIn = null, timerFadeOut = null;
    if (fadeInMs > 0) {
      const passos = 20;
      let passo = 0;
      timerFadeIn = setInterval(() => {
        passo++;
        audio.volume = Math.min(volBase, (volBase * passo) / passos);
        if (passo >= passos) clearInterval(timerFadeIn);
      }, fadeInMs / passos);
    }
    if (fadeOutMs > 0 && duracaoMs && duracaoMs > fadeOutMs) {
      timerFadeOut = setTimeout(() => {
        const passos = 20;
        let passo = 0;
        const partida = audio.volume;
        const t2 = setInterval(() => {
          passo++;
          audio.volume = Math.max(0, partida * (1 - passo / passos));
          if (passo >= passos) clearInterval(t2);
        }, fadeOutMs / passos);
      }, duracaoMs - fadeOutMs);
    }
    const parar = () => {
      if (timerFadeIn) clearInterval(timerFadeIn);
      if (timerFadeOut) clearTimeout(timerFadeOut);
      try { audio.pause(); } catch (e) {}
    };
    registrarSomAtivo(parar);
    return parar;
  } catch (e) { console.warn("[som] falhou:", e); return () => {}; }
}

// Monta o HTML/CSS de uma ação completa (fundo, borda, glow, texto
// estilizado, barra de progresso) — usado tanto no card real do overlay
// quanto na prévia ao vivo do editor, garantindo que fica idêntico.
function montarCardAcaoHtml(acao, tema, textoResolvido) {
  const corDestaque = acao.cor || tema.corPrimaria;
  const fundo = Object.assign({ tipo: "cor", cor: tema.corCard, corGradiente2: tema.corFundo, imagemUrl: "", blur: 0, glow: false, radius: tema.raio, opacidade: 100 }, acao.fundo || {});
  const txt = Object.assign({ fonte: "", cor: tema.corTexto, tamanho: 15, alinhamento: "left", contornoAtivo: false, contornoCor: "#000000", contornoEspessura: 2, sombraAtiva: false, sombraCor: "#000000", sombraBlur: 4 }, acao.textoEstilo || {});
  const barra = Object.assign({ ativo: false, cor: corDestaque, espessura: 4 }, acao.barraProgresso || {});

  let backgroundCss;
  if (fundo.tipo === "gradiente") backgroundCss = `background:linear-gradient(135deg, ${fundo.cor}, ${fundo.corGradiente2});`;
  else if (fundo.tipo === "imagem" && fundo.imagemUrl) backgroundCss = `background:url('${fundo.imagemUrl}') center/cover, ${fundo.cor};`;
  else backgroundCss = `background:${fundo.cor};`;
  const blurCss = fundo.blur > 0 ? `backdrop-filter:blur(${fundo.blur}px);-webkit-backdrop-filter:blur(${fundo.blur}px);` : "";
  const opacidadeDecimal = Math.max(0, Math.min(100, fundo.opacidade)) / 100;
  const glowCss = fundo.glow ? `0 0 22px ${corDestaque}88, ` : "";

  const fonteFamilia = FONTES[txt.fonte] ? FONTES[txt.fonte].css : "inherit";
  const textoSombraPartes = [];
  if (txt.contornoAtivo) {
    const e = txt.contornoEspessura;
    textoSombraPartes.push(`-${e}px -${e}px 0 ${txt.contornoCor}`, `${e}px -${e}px 0 ${txt.contornoCor}`, `-${e}px ${e}px 0 ${txt.contornoCor}`, `${e}px ${e}px 0 ${txt.contornoCor}`);
  }
  if (txt.sombraAtiva) textoSombraPartes.push(`2px 3px ${txt.sombraBlur}px ${txt.sombraCor}`);
  const textoSombraCss = textoSombraPartes.length ? `text-shadow:${textoSombraPartes.join(",")};` : "";

  const innerHtml = `
    <div class="acao-fundo" style="position:absolute;inset:0;${backgroundCss}${blurCss}opacity:${opacidadeDecimal};"></div>
    <div style="position:relative;z-index:1;display:flex;align-items:center;gap:12px;padding:14px 18px;text-align:${txt.alinhamento};${txt.alinhamento === "center" ? "justify-content:center;" : txt.alinhamento === "right" ? "justify-content:flex-end;" : ""}">
      <div style="width:38px;height:38px;flex-shrink:0;border-radius:50%;background:${corDestaque};display:flex;align-items:center;justify-content:center;font-size:18px;">${iconeAcaoHtml(acao, 18)}</div>
      <div style="min-width:0;">
        <div style="font-size:11.5px;color:${tema.corTextoSec};">${acao.nome || ""}</div>
        <div style="font-size:${txt.tamanho}px;color:${txt.cor};font-weight:700;font-family:${fonteFamilia};${textoSombraCss}white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${textoResolvido}</div>
      </div>
    </div>
    ${barra.ativo ? `<div style="position:relative;z-index:1;height:${barra.espessura}px;background:${barra.cor}33;"><div class="acao-barra-progresso" style="height:100%;width:100%;background:${barra.cor};transform-origin:left;"></div></div>` : ""}
  `.trim();
  const wrapperCss = `position:relative;overflow:hidden;border-radius:${fundo.radius}px;border:1.5px solid ${corDestaque};box-shadow:${glowCss}0 10px 30px rgba(0,0,0,.35);`;
  return { innerHtml, wrapperCss };
}

// opcoes (Fase 4 — "Sistema de Fila"): { config: { maximoItens, agruparIguais,
// ignorarDuplicados }, aoAtualizar: fn(itens) } — tudo opcional, sem opcoes
// o comportamento é idêntico ao original (fila sem limite, sem agrupar).
function criarFilaDeAcoes(container, volumeGeralPadrao, opcoes) {
  const cfgFila = Object.assign({ maximoItens: 0, agruparIguais: false, ignorarDuplicados: false }, (opcoes && opcoes.config) || {});
  const aoAtualizar = (opcoes && opcoes.aoAtualizar) || null;
  const fila = [];
  let mostrando = false;
  let itemAtual = null;
  let cartaoAtual = null;
  let timerAtual = null;
  const ultimoDisparoPorAcao = {};

  function notificar() {
    if (!aoAtualizar) return;
    const itens = [];
    if (itemAtual) itens.push({ nome: itemAtual.acao.nome, cor: itemAtual.acao.cor, status: "mostrando" });
    fila.forEach(it => itens.push({ nome: it.acao.nome, cor: it.acao.cor, status: "aguardando", quantidade: it.quantidade || 1 }));
    try { aoAtualizar(itens); } catch (e) {}
  }

  function processarFila() {
    if (mostrando || fila.length === 0) return;
    mostrando = true;
    const item = fila.shift();
    itemAtual = item;
    const { acao, tema } = item;
    let textoResolvido = item.textoResolvido;
    if (item.quantidade > 1) textoResolvido += ` (x${item.quantidade})`;
    const montado = montarCardAcaoHtml(acao, tema, textoResolvido);
    const anim = ANIMACOES_ACAO[(acao.animacao && acao.animacao.entrada) || "slideTop"] || ANIMACOES_ACAO.fade;
    const cartao = document.createElement("div");
    cartao.style.cssText = montado.wrapperCss + `animation:${anim.in};`;
    cartao.innerHTML = montado.innerHtml;
    container.appendChild(cartao);
    cartaoAtual = cartao;
    iniciarLottiesPendentes(cartao);
    const barraEl = cartao.querySelector(".acao-barra-progresso");
    const duracaoMs = acao.duracaoMs || 4000;
    if (barraEl) {
      requestAnimationFrame(() => {
        barraEl.style.transition = `transform ${duracaoMs}ms linear`;
        barraEl.style.transform = "scaleX(0)";
      });
    }
    const pararSom = tocarSomAcao(acao.som, volumeGeralPadrao, duracaoMs);
    const animSaida = ANIMACOES_ACAO[(acao.animacao && acao.animacao.saida) || "fade"] || ANIMACOES_ACAO.fade;
    notificar();
    timerAtual = setTimeout(() => {
      pararSom();
      cartao.style.animation = animSaida.out;
      setTimeout(() => {
        cartao.remove();
        if (cartaoAtual === cartao) cartaoAtual = null;
        mostrando = false;
        itemAtual = null;
        timerAtual = null;
        notificar();
        processarFila();
      }, 320);
    }, duracaoMs);
  }

  return {
    mostrar(acao, tema, textoResolvido, animacoesAtivas) {
      const agora = Date.now();
      const cooldownMs = acao.cooldownMs || 0;
      if (cooldownMs > 0 && ultimoDisparoPorAcao[acao.id] && agora - ultimoDisparoPorAcao[acao.id] < cooldownMs) return; // ainda em cooldown
      ultimoDisparoPorAcao[acao.id] = agora;

      if (cfgFila.ignorarDuplicados) {
        const jaTem = (itemAtual && itemAtual.acao.id === acao.id && itemAtual.textoResolvido === textoResolvido)
          || fila.some(it => it.acao.id === acao.id && it.textoResolvido === textoResolvido);
        if (jaTem) return;
      }
      if (cfgFila.agruparIguais) {
        const existente = fila.find(it => it.acao.id === acao.id);
        if (existente) { existente.quantidade = (existente.quantidade || 1) + 1; notificar(); return; }
      }

      const prioridade = acao.prioridade || 5;
      let indiceInsercao = fila.length;
      for (let i = 0; i < fila.length; i++) {
        if ((fila[i].acao.prioridade || 5) < prioridade) { indiceInsercao = i; break; }
      }
      fila.splice(indiceInsercao, 0, { acao, tema, textoResolvido, animacoesAtivas, quantidade: 1 });
      if (cfgFila.maximoItens > 0 && fila.length > cfgFila.maximoItens) {
        fila.length = cfgFila.maximoItens; // descarta o excesso do fim (menor prioridade primeiro)
      }
      notificar();
      processarFila();
    },
    // "Cancelar fila" (Fase 4): esvazia tudo que está esperando e tira o
    // card que estiver na tela na hora, sem esperar a duração dele acabar.
    cancelar() {
      fila.length = 0;
      if (timerAtual) { clearTimeout(timerAtual); timerAtual = null; }
      if (cartaoAtual) { cartaoAtual.remove(); cartaoAtual = null; }
      mostrando = false;
      itemAtual = null;
      notificar();
    },
  };
}

function renderAlerta() {
  const cfg = carregarConfig();
  const t = temaEfetivo(cfg, "alerta");
  const fonteCss = carregarFonteGoogle(t.fonte);
  document.body.style.fontFamily = fonteCss;

  const root = document.createElement("div");
  root.style.cssText = "display:flex;flex-direction:column;gap:10px;max-width:360px;";
  document.body.appendChild(root);
  const api = criarFilaDeCards(root);
  let recordeAtual = 0;

  function processarEventoAlerta(payload) {
    if (payload.event !== "gift") return;
    const data = payload.data || {};
    const valorBase = extrairValorPresente(data);
    if (valorBase === null) return;
    const valor = valorBase * cfg.valores.presente;

    tocarSomConfig(cfg.sons.presente, cfg.sons.volume);
    if (!cfg.alerta.ativo || valor < cfg.alerta.valorMinimo) return;
    const nickname = data.nickname ?? data.user?.nickname ?? data.uniqueId ?? "espectador";
    const ehRecorde = valor > recordeAtual;
    if (ehRecorde) recordeAtual = valor;
    api.mostrar({
      icone: "🎁",
      titulo: ehRecorde ? "🏆 maior presente da live" : "novo presente",
      subtitulo: `${nickname} <span style="color:${t.corPrimaria};">· ${valor} pts</span>`,
      destaque: ehRecorde,
      tema: t,
      duracaoMs: cfg.alerta.duracaoMs,
      animacoesAtivas: cfg.animacoes,
    });
  }

  escutarSimuladorDoPainel(processarEventoAlerta);
  if (params.get("sim") === "1") {
    iniciarSimulador(processarEventoAlerta, { min: 900, max: 2200 });
  } else {
    conectarTikFinity(cfg, "overlay-alerta", processarEventoAlerta);
  }
}

/* ============================================================
   OVERLAY: COMBO / SEQUÊNCIA
   ============================================================ */

// cria a caixinha de combo dentro de "container" e devolve uma API
// pra registrar eventos (usado no overlay de verdade e na prévia).
// aoIncrementar(contagem), se passado, roda a cada incremento (pra
// tocar som a cada N, por exemplo).
function criarNoCombo(container, tema, aoIncrementar) {
  const caixa = document.createElement("div");
  caixa.style.cssText = `display:none;align-items:baseline;gap:8px;padding:10px 18px;border-radius:${Math.max(8, tema.raio)}px;background:${tema.corCard};border:1px solid ${tema.corBorda};width:fit-content;`;
  caixa.innerHTML = `<span class="combo-numero" style="font-size:24px;font-weight:800;color:${tema.corPrimaria};">0</span><span style="font-size:11px;color:${tema.corTextoSec};text-transform:uppercase;letter-spacing:0.05em;">combo</span>`;
  container.appendChild(caixa);
  const numeroEl = caixa.querySelector(".combo-numero");

  let contagem = 0;
  let ultimoTimestamp = 0;
  let timerEsconder = null;

  return {
    registrarEvento(janelaMs, animacoesAtivas) {
      const agora = Date.now();
      contagem = (agora - ultimoTimestamp > janelaMs) ? 1 : contagem + 1;
      ultimoTimestamp = agora;
      numeroEl.textContent = contagem;
      caixa.style.display = contagem >= 2 ? "flex" : "none";
      if (animacoesAtivas) {
        numeroEl.classList.remove("anim-pop");
        void numeroEl.offsetWidth;
        numeroEl.classList.add("anim-pop");
      }
      clearTimeout(timerEsconder);
      timerEsconder = setTimeout(() => { caixa.style.display = "none"; contagem = 0; }, janelaMs);
      if (aoIncrementar) aoIncrementar(contagem);
    },
  };
}

function renderCombo() {
  const cfg = carregarConfig();
  const t = temaEfetivo(cfg, "combo");
  const fonteCss = carregarFonteGoogle(t.fonte);
  document.body.style.fontFamily = fonteCss;

  const root = document.createElement("div");
  document.body.appendChild(root);
  const api = criarNoCombo(root, t, (contagem) => {
    const s = cfg.sons.combo;
    if (s.ativo && s.aCada > 0 && contagem % s.aCada === 0) tocarSomConfig(s, cfg.sons.volume);
  });

  function processarEventoCombo(payload) {
    if (!cfg.combo.ativo) return;
    const tipo = payload.event === "comment" ? "chat" : payload.event === "member" ? "follow" : payload.event;
    if (!cfg.combo.fontes.includes(tipo)) return;
    api.registrarEvento(cfg.combo.janelaMs, cfg.animacoes);
  }

  escutarSimuladorDoPainel(processarEventoCombo);
  if (params.get("sim") === "1") {
    iniciarSimulador(processarEventoCombo, { min: 400, max: 1000 });
  } else {
    conectarTikFinity(cfg, "overlay-combo", processarEventoCombo);
  }
}

/* ============================================================
   OVERLAY: Vitrine de prêmios — lista os prêmios (tiers) rolando
   em loop contínuo, da direita pra esquerda, tipo um "letreiro".
   Não depende de eventos nem do TikFinity — só mostra os prêmios
   configurados. Ótimo pra deixar fixo numa faixa da tela durante
   a live inteira.
   ============================================================ */
function renderVitrine() {
  const cfg = carregarConfig();
  const t = temaEfetivo(cfg, "vitrine");
  const fonteCss = carregarFonteGoogle(t.fonte);
  document.body.style.fontFamily = fonteCss;
  document.body.style.overflow = "hidden";

  const faixa = document.createElement("div");
  faixa.style.cssText = `
    position: fixed; left: 0; bottom: 0; width: 100%; height: 68px;
    overflow: hidden; display: flex; align-items: center;
    background: ${t.corFundo}e6; border-top: 2px solid ${t.corPrimaria};
    box-sizing: border-box;
  `;

  const trilho = document.createElement("div");
  trilho.style.cssText = "display:flex;white-space:nowrap;will-change:transform;";
  faixa.appendChild(trilho);
  document.body.appendChild(faixa);

  function itemHtml(tier, index, total) {
    const raridade = raridadeDoTier(index, total);
    return `
      <span style="display:inline-flex;align-items:center;gap:12px;padding:0 44px;font-size:21px;font-weight:700;color:${t.corTexto};border-left:3px solid ${raridade.cor}88;">
        <span style="font-size:24px;">${iconeTierHtml(tier, 24)}</span>
        <span>${tier.nome}</span>
        <span style="font-size:12px;font-weight:700;color:${raridade.cor};text-transform:uppercase;letter-spacing:0.04em;">${raridade.nome}</span>
        <span style="color:${t.corPrimaria};">${Number(tier.pontos).toLocaleString("pt-BR")} pts</span>
      </span>
    `;
  }

  const tiers = (cfg.tiers && cfg.tiers.length) ? cfg.tiers : [{ id: "vazio", nome: "Configure os prêmios em Config", pontos: 0 }];
  const conteudo = tiers.map((tier, i) => itemHtml(tier, i, tiers.length)).join("");
  // duplica o conteúdo pra criar um loop sem costura: quando a 1ª cópia
  // sai totalmente pela esquerda, a 2ª já está exatamente onde a 1ª começou.
  trilho.innerHTML = conteudo + conteudo;

  const VELOCIDADE_PX_POR_SEG = 70;
  function iniciarAnimacao() {
    const larguraTotal = trilho.scrollWidth / 2;
    if (!larguraTotal) { requestAnimationFrame(iniciarAnimacao); return; }
    const duracaoSeg = larguraTotal / VELOCIDADE_PX_POR_SEG;
    const styleTag = document.createElement("style");
    styleTag.textContent = `
      @keyframes vitrineScroll { from { transform: translateX(0); } to { transform: translateX(-${larguraTotal}px); } }
    `;
    document.head.appendChild(styleTag);
    trilho.style.animation = `vitrineScroll ${duracaoSeg}s linear infinite`;
  }
  requestAnimationFrame(iniciarAnimacao);
}

/* ============================================================
   OVERLAY: EVENTOS PERSONALIZADOS (regras estilo TikFinity)
   - "Ações" (cfg.automacoes.acoes): reações reutilizáveis — card com
     ícone, texto (aceita {nickname} e {valor}), cor e som.
   - "Eventos" (cfg.automacoes.eventos): regras gatilho → condição →
     ação. Quando um evento do TikFinity (ou do simulador) bate com
     o gatilho e a condição de uma regra ativa, dispara a ação ligada.
   ============================================================ */
function tipoGatilhoDoEvento(tipoEvento) {
  if (tipoEvento === "gift") return "presente";
  if (tipoEvento === "like") return "like";
  if (tipoEvento === "chat" || tipoEvento === "comment") return "mensagem";
  if (tipoEvento === "follow" || tipoEvento === "member") return "seguidor";
  if (tipoEvento === "share") return "compartilhamento";
  return null;
}
function extrairValorEvento(gatilho, payload) {
  const data = payload.data || {};
  if (gatilho === "presente") {
    const base = extrairValorPresente(data);
    return base === null ? 0 : base * (data.repeatCount || 1);
  }
  if (gatilho === "like") return data.likeCount ?? data.count ?? 1;
  return 1;
}

function renderEventos() {
  const cfg = carregarConfig();
  const t = temaEfetivo(cfg, "eventos");
  const fonteCss = carregarFonteGoogle(t.fonte);
  document.body.style.fontFamily = fonteCss;

  const root = document.createElement("div");
  root.style.cssText = "position:fixed;top:24px;right:24px;display:flex;flex-direction:column;gap:10px;max-width:380px;align-items:flex-end;";
  document.body.appendChild(root);

  // reporta o estado da fila pro painel (só faz sentido dentro de um
  // iframe do Simulador — no OBS de verdade não tem "parent" ouvindo,
  // e isso não afeta em nada o funcionamento do overlay em si)
  function reportarFilaAoPainel(itens) {
    if (window.parent === window) return;
    try { window.parent.postMessage({ tipo: "filaEventosPainel", itens }, "*"); } catch (e) {}
  }
  const api = criarFilaDeAcoes(root, cfg.sons.volume, { config: cfg.automacoes.filaConfig, aoAtualizar: reportarFilaAoPainel });
  window.addEventListener("message", (e) => {
    if (e.data && e.data.tipo === "cancelarFilaPainel") api.cancelar();
  });

  const ultimoDisparoRegra = {};

  // ------------------------------------------------------------
  // Dispara UMA regra já sabida como "deve rodar" (evento bateu +
  // condições OK, OU chamada em cadeia via passo "executarRegra"):
  // aplica efeitos em variável, mostra a ação (se estiver ativa) e
  // roda a sequência de passos extras, se houver.
  // profundidade evita loop infinito de regras se chamando entre si.
  // ------------------------------------------------------------
  function dispararRegra(regra, ctx, profundidade) {
    aplicarEfeitosVariaveis(regra, ctx);
    const acao = (cfg.automacoes.acoes || []).find(a => a.id === regra.acaoId);
    if (acao && acao.ativo !== false) {
      const textoResolvido = textoComPlaceholders(acao.texto, ctx.nickname, ctx.valor, cfg);
      api.mostrar(acao, t, textoResolvido, cfg.animacoes);
    }
    if (regra.passos && regra.passos.length) executarPassosSequencia(regra.passos, ctx, profundidade || 0);
  }

  function executarPassosSequencia(passos, ctx, profundidade) {
    if (profundidade > 5) return; // guarda contra "executar outra regra" em loop
    let i = 0;
    function proximo() {
      if (i >= passos.length) return;
      executarUmPasso(passos[i++], ctx, profundidade, proximo);
    }
    proximo();
  }

  function executarUmPasso(passo, ctx, profundidade, continuar) {
    switch (passo.tipo) {
      case "esperar":
        setTimeout(continuar, Math.max(0, Number(passo.segundos) || 0) * 1000);
        return; // não chama continuar() agora — só depois do setTimeout
      case "tocarSom":
        tocarSomConfig({ ativo: true, som: passo.som || "ding", url: passo.url || "" }, passo.volume != null ? passo.volume : cfg.sons.volume);
        break;
      case "pararSom":
        pararTodosOsSons();
        break;
      case "confete":
        efeitoConfeteTela(passo.cor);
        break;
      case "fogos":
        efeitoFogosTela(passo.cor);
        break;
      case "variavel": {
        const runtime = lerVariaveisRuntime();
        aplicarUmEfeitoVariavel(passo, ctx, runtime);
        salvarVariaveisRuntime(runtime);
        break;
      }
      case "executarRegra": {
        const outra = (cfg.automacoes.eventos || []).find(r => r.id === passo.regraId);
        if (outra) dispararRegra(outra, ctx, profundidade + 1);
        break;
      }
    }
    continuar();
  }

  function processarEventoAutomacao(payload) {
    const gatilho = tipoGatilhoDoEvento(payload.event);
    if (!gatilho) return;
    const data = payload.data || {};
    const nickname = data.nickname ?? data.user?.nickname ?? data.uniqueId ?? "espectador";
    const valor = extrairValorEvento(gatilho, payload);
    const ctx = { gatilho, payload, data, nickname, valor, cfg };

    // prioridade mais alta primeiro; várias regras podem disparar pro
    // mesmo evento (cada uma com sua própria ação e cooldown).
    const regrasOrdenadas = (cfg.automacoes.eventos || []).slice().sort((a, b) => (b.prioridade || 5) - (a.prioridade || 5));
    regrasOrdenadas.forEach(regra => {
      if (regra.ativo === false) return;
      if (!avaliarRegra(regra, ctx)) return;
      const agora = Date.now();
      if (regra.cooldownMs && ultimoDisparoRegra[regra.id] && agora - ultimoDisparoRegra[regra.id] < regra.cooldownMs) return;
      ultimoDisparoRegra[regra.id] = agora;
      dispararRegra(regra, ctx, 0);
    });
  }

  escutarSimuladorDoPainel(processarEventoAutomacao);
  if (params.get("sim") === "1") {
    iniciarSimulador(processarEventoAutomacao, { min: 1000, max: 2400 });
  } else {
    conectarTikFinity(cfg, "overlay-eventos", processarEventoAutomacao);
  }
}
